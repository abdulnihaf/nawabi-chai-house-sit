<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NCH Ops Cockpit — Live Discrepancy Hunter</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --bg:#0b0d10; --panel:#12161c; --panel2:#1a1f27; --border:#242b36;
    --text:#e6e9ef; --muted:#8892a3; --amber:#D4A44C; --wheat:#E9D1A9; --brown:#AC7E54;
    --green:#22c55e; --red:#ef4444; --orange:#f59e0b; --blue:#3b82f6;
  }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); font-size:13px; line-height:1.45; }
  a { color:var(--amber); text-decoration:none; }
  button { cursor:pointer; font-family:inherit; }

  /* PIN gate */
  .pin-gate { position:fixed; inset:0; background:var(--bg); display:flex; align-items:center; justify-content:center; z-index:100; }
  .pin-box { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:28px 32px; width:300px; text-align:center; }
  .pin-box h1 { font-size:16px; color:var(--amber); margin-bottom:4px; }
  .pin-box p { color:var(--muted); font-size:11px; margin-bottom:20px; }
  .pin-dots { display:flex; gap:10px; justify-content:center; margin-bottom:18px; }
  .pin-dot { width:14px; height:14px; border-radius:50%; border:2px solid var(--border); }
  .pin-dot.filled { background:var(--amber); border-color:var(--amber); }
  .pin-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .pin-pad button { background:var(--panel2); border:1px solid var(--border); color:var(--text); font-size:18px; padding:14px 0; border-radius:8px; }
  .pin-pad button:hover { background:var(--border); }
  .pin-err { color:var(--red); font-size:11px; min-height:14px; margin-top:10px; }

  /* Header */
  .header { background:var(--panel); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:16px; flex-wrap:wrap; position:sticky; top:0; z-index:10; }
  .brand { font-weight:700; color:var(--amber); font-size:14px; }
  .brand span { color:var(--muted); font-weight:400; margin-left:6px; }
  .who { margin-left:auto; color:var(--muted); font-size:11px; }
  .logout-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:4px 10px; border-radius:6px; font-size:11px; }

  /* Filter bar */
  .filters { background:var(--panel); border-bottom:1px solid var(--border); padding:10px 16px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .filter-group { display:flex; gap:4px; align-items:center; background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:4px 8px; }
  .filter-group label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-right:4px; }
  .filter-group input, .filter-group select { background:transparent; border:none; color:var(--text); font-size:12px; padding:4px; outline:none; font-family:inherit; }
  .filter-group input[type="datetime-local"] { color-scheme:dark; width:165px; }
  .preset-btn { background:var(--panel2); border:1px solid var(--border); color:var(--text); padding:5px 10px; border-radius:6px; font-size:11px; }
  .preset-btn.active { background:var(--amber); color:#000; border-color:var(--amber); }
  .chk-group { display:flex; gap:4px; flex-wrap:wrap; }
  .chk-btn { background:var(--panel2); border:1px solid var(--border); color:var(--muted); padding:3px 7px; border-radius:4px; font-size:10px; }
  .chk-btn.on { background:var(--amber); color:#000; border-color:var(--amber); }
  .apply-btn { background:var(--amber); border:none; color:#000; padding:7px 14px; border-radius:6px; font-weight:600; font-size:12px; }
  .refresh-btn { background:var(--blue); border:none; color:#fff; padding:7px 10px; border-radius:6px; font-size:11px; }
  .auto-refresh { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:11px; }

  /* Tabs */
  .tabs { background:var(--panel); border-bottom:1px solid var(--border); padding:0 16px; display:flex; gap:0; overflow-x:auto; }
  .tab { background:transparent; border:none; color:var(--muted); padding:10px 16px; font-size:12px; border-bottom:2px solid transparent; white-space:nowrap; }
  .tab:hover { color:var(--text); }
  .tab.active { color:var(--amber); border-bottom-color:var(--amber); }
  .tab-badge { background:var(--red); color:#fff; font-size:9px; padding:1px 5px; border-radius:8px; margin-left:5px; }

  /* Content */
  .content { padding:16px; }
  .grid { display:grid; gap:12px; }
  .grid-4 { grid-template-columns:repeat(4,1fr); }
  .grid-3 { grid-template-columns:repeat(3,1fr); }
  .grid-2 { grid-template-columns:repeat(2,1fr); }
  @media (max-width:900px) { .grid-4 { grid-template-columns:repeat(2,1fr); } .grid-3 { grid-template-columns:1fr; } }

  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .card h3 { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:8px; font-weight:500; }
  .card .big { font-size:22px; font-weight:700; color:var(--text); }
  .card .big.amber { color:var(--amber); }
  .card .big.red { color:var(--red); }
  .card .big.green { color:var(--green); }
  .card .sub { font-size:10px; color:var(--muted); margin-top:4px; }

  /* Table */
  table { width:100%; border-collapse:collapse; font-size:11px; }
  th { background:var(--panel2); color:var(--muted); text-align:left; padding:8px 10px; font-size:10px; text-transform:uppercase; letter-spacing:0.5px; font-weight:500; border-bottom:1px solid var(--border); position:sticky; top:0; }
  td { padding:7px 10px; border-bottom:1px solid var(--border); }
  tr:hover td { background:var(--panel2); }
  .table-wrap { background:var(--panel); border:1px solid var(--border); border-radius:10px; overflow:hidden; max-height:70vh; overflow-y:auto; }

  /* Badges */
  .pill { display:inline-block; padding:2px 8px; border-radius:10px; font-size:10px; font-weight:600; }
  .pill-ok { background:rgba(34,197,94,0.15); color:var(--green); }
  .pill-warn { background:rgba(245,158,11,0.15); color:var(--orange); }
  .pill-crit { background:rgba(239,68,68,0.18); color:var(--red); }
  .pill-info { background:rgba(59,130,246,0.15); color:var(--blue); }
  .pill-mute { background:var(--panel2); color:var(--muted); }

  /* Issues */
  .issue { background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--blue); border-radius:8px; padding:12px 14px; margin-bottom:10px; }
  .issue.critical { border-left-color:var(--red); }
  .issue.high { border-left-color:var(--orange); }
  .issue.warning { border-left-color:var(--amber); }
  .issue.info { border-left-color:var(--blue); }
  .issue-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .issue-title { font-size:13px; font-weight:600; }
  .issue-expand { background:transparent; border:none; color:var(--amber); font-size:11px; }
  .issue-evidence { background:var(--panel2); border-radius:6px; padding:10px; margin-top:8px; font-family:'SF Mono',Consolas,monospace; font-size:10px; max-height:260px; overflow:auto; display:none; }
  .issue-evidence.show { display:block; }
  .issue-evidence pre { color:var(--muted); white-space:pre-wrap; word-break:break-word; }

  /* Modal */
  .modal { position:fixed; inset:0; background:rgba(0,0,0,0.8); display:none; align-items:center; justify-content:center; z-index:50; padding:20px; }
  .modal.show { display:flex; }
  .modal-body { background:var(--panel); border:1px solid var(--border); border-radius:12px; max-width:800px; width:100%; max-height:90vh; overflow:auto; padding:20px; }
  .modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }
  .modal-close { background:transparent; border:none; color:var(--muted); font-size:18px; }

  .empty { padding:40px; text-align:center; color:var(--muted); font-size:12px; }
  .loading { padding:20px; text-align:center; color:var(--muted); }
  .num { text-align:right; font-variant-numeric:tabular-nums; }
  .code { font-family:'SF Mono',Consolas,monospace; font-size:10px; color:var(--muted); }
  .hidden { display:none !important; }

  /* Timeline bars */
  .timeline { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px; }
  .tl-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:11px; }
  .tl-label { width:110px; color:var(--muted); font-size:10px; }
  .tl-bar { flex:1; background:var(--panel2); height:16px; border-radius:3px; overflow:hidden; position:relative; }
  .tl-fill { height:100%; transition:width 0.3s; }
  .tl-val { width:80px; text-align:right; font-variant-numeric:tabular-nums; }

  .matrix-table td, .matrix-table th { padding:6px 10px; font-size:11px; }
  .matrix-table td.num { font-variant-numeric:tabular-nums; }

  /* Local per-tab filter strip */
  .local-filters { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:10px 12px; margin-bottom:12px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .local-filters .lf-group { display:flex; gap:4px; align-items:center; background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:3px 8px; }
  .local-filters .lf-group label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; margin-right:4px; }
  .local-filters input[type="text"], .local-filters input[type="number"] { background:transparent; border:none; color:var(--text); font-size:11px; padding:3px; outline:none; font-family:inherit; width:90px; }
  .local-filters input[type="text"].wide { width:140px; }
  .lf-btn { background:var(--panel2); border:1px solid var(--border); color:var(--muted); padding:3px 8px; border-radius:4px; font-size:10px; cursor:pointer; font-family:inherit; }
  .lf-btn.on { background:var(--amber); color:#000; border-color:var(--amber); }
  .lf-clear { background:transparent; border:1px solid var(--border); color:var(--muted); padding:3px 8px; border-radius:4px; font-size:10px; cursor:pointer; margin-left:auto; font-family:inherit; }
  .lf-count { font-size:10px; color:var(--muted); padding:3px 6px; }
</style>
</head>
<body>

<!-- PIN Gate -->
<div class="pin-gate" id="pin-gate">
  <div class="pin-box">
    <h1>NCH Ops Cockpit</h1>
    <p>Live discrepancy dashboard · GM / Manager access only</p>
    <div class="pin-dots" id="pin-dots"></div>
    <div class="pin-pad" id="pin-pad"></div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- Main app -->
<div id="app" class="hidden">
  <!-- Header -->
  <div class="header">
    <div class="brand">NCH Cockpit <span>Live · Odoo + Razorpay + D1</span></div>
    <div class="who" id="who-label"></div>
    <button class="logout-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Global filter bar: TIME WINDOW ONLY (everything else is tab-local) -->
  <div class="filters">
    <div class="filter-group">
      <label>Quick</label>
      <button class="preset-btn" data-preset="last-1h">1h</button>
      <button class="preset-btn" data-preset="last-3h">3h</button>
      <button class="preset-btn" data-preset="morning-shift">Morning (6–14)</button>
      <button class="preset-btn" data-preset="evening-shift">Evening (14–23)</button>
      <button class="preset-btn" data-preset="today">Today</button>
      <button class="preset-btn" data-preset="yesterday">Yesterday</button>
      <button class="preset-btn" data-preset="7d">7D</button>
    </div>
    <div class="filter-group" id="custom-range">
      <label>From</label><input type="datetime-local" id="from-input">
      <label>To</label><input type="datetime-local" id="to-input">
    </div>
    <button class="apply-btn" onclick="applyFilters()">Apply</button>
    <button class="refresh-btn" onclick="refreshTab()">↻ Refresh</button>
    <div class="auto-refresh">
      <input type="checkbox" id="auto-refresh" checked>
      <label for="auto-refresh">Auto 30s (Summary)</label>
    </div>
    <div style="color:var(--muted); font-size:10px; margin-left:auto;">Tab-local filters below each pane</div>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <button class="tab active" data-tab="summary">Summary <span class="tab-badge hidden" id="tc-summary">0</span></button>
    <button class="tab" data-tab="timeline">Timeline <span class="tab-badge hidden" id="tc-timeline">0</span></button>
    <button class="tab" data-tab="orders">Orders <span class="tab-badge hidden" id="tc-orders">0</span></button>
    <button class="tab" data-tab="razorpay">Razorpay <span class="tab-badge hidden" id="tc-razorpay">0</span></button>
    <button class="tab" data-tab="runners">Runners <span class="tab-badge hidden" id="tc-runners">0</span></button>
    <button class="tab" data-tab="discrepancies">Discrepancies <span class="tab-badge hidden" id="disc-badge">0</span> <span class="tab-badge hidden" id="tc-disc">0</span></button>
  </div>

  <!-- Content panes -->
  <div class="content">
    <div id="pane-summary" class="pane"></div>
    <div id="pane-timeline" class="pane hidden"></div>
    <div id="pane-orders" class="pane hidden"></div>
    <div id="pane-razorpay" class="pane hidden"></div>
    <div id="pane-runners" class="pane hidden"></div>
    <div id="pane-discrepancies" class="pane hidden"></div>
  </div>
</div>

<!-- Drilldown modal -->
<div class="modal" id="modal">
  <div class="modal-body">
    <div class="modal-head">
      <div id="modal-title" style="font-size:14px; font-weight:600;">Order drilldown</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script>
// ────────────────────────────────────────────────
// State
// ────────────────────────────────────────────────
const S = {
  pin: '', user: null, role: null, code: null,
  from: null, to: null, preset: 'today',
  // API always fetches ALL POS/PM — filtering happens client-side per tab.
  pos_ids: [27, 28, 29], pm_ids: [37, 38, 39, 40, 48, 49],
  tab: 'summary',
  autoTimer: null,
  cache: {},
  // Per-tab local filters (client-side, no refetch)
  sum: { view: 'all' }, // all | pos | pm | qr | runner
  tl:  { pos: [27,28,29], pms: [37,38,39,40,48,49], bucket: '1h' }, // bucket: 15m|30m|1h|4h
  ord: { pos: [27,28,29], pms: [37,38,39,40,48,49], search: '', minAmt: '', maxAmt: '', orphanOnly: false },
  rzp: { qrs: ['COUNTER','RUNNER_COUNTER','RUN001','RUN002','RUN003','RUN004','RUN005'], match: 'all', minAmt: '', maxAmt: '', vpa: '', order: '' },
  run: { codes: ['RUN001','RUN002','RUN003','RUN004','RUN005'], variance: 'all' },
  disc: { severity: ['critical','high','warning','info'], types: [] },
};

// Defaults (for reset & filter-count comparison)
const DEF = {
  sum: { view: 'all' },
  tl:  { pos: [27,28,29], pms: [37,38,39,40,48,49], bucket: '1h' },
  ord: { pos: [27,28,29], pms: [37,38,39,40,48,49], search: '', minAmt: '', maxAmt: '', orphanOnly: false },
  rzp: { qrs: ['COUNTER','RUNNER_COUNTER','RUN001','RUN002','RUN003','RUN004','RUN005'], match: 'all', minAmt: '', maxAmt: '', vpa: '', order: '' },
  run: { codes: ['RUN001','RUN002','RUN003','RUN004','RUN005'], variance: 'all' },
  disc: { severity: ['critical','high','warning','info'], types: [] },
};

const PM_NAMES = {37:'Cash', 38:'UPI', 39:'Card', 40:'RunLedger', 46:'Swiggy', 47:'Zomato', 48:'Token', 49:'Comp', 50:'WABA-COD', 51:'WABA-UPI'};
const POS_NAMES = {27:'CashCtr', 28:'RunCtr', 29:'Delivery'};
const RUNNERS = {64:'RUN001',65:'RUN002',66:'RUN003',67:'RUN004',68:'RUN005'};

const el = id => document.getElementById(id);
const fmtMoney = n => '₹' + (n||0).toLocaleString('en-IN', {maximumFractionDigits:0});
const fmtTime = iso => { const d = new Date(iso); return d.toLocaleString('en-IN',{hour12:false,day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}); };
const fmtTimeOnly = iso => new Date(iso).toLocaleTimeString('en-IN',{hour12:false,hour:'2-digit',minute:'2-digit'});
const escape = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

// ────────────────────────────────────────────────
// PIN gate
// ────────────────────────────────────────────────
function buildPinPad() {
  const pad = el('pin-pad');
  pad.innerHTML = '';
  ['1','2','3','4','5','6','7','8','9','⌫','0','✓'].forEach(k => {
    const b = document.createElement('button');
    b.textContent = k;
    b.onclick = () => pinKey(k);
    pad.appendChild(b);
  });
  renderPinDots();
}
function pinKey(k) {
  if (k === '⌫') { S.pin = S.pin.slice(0, -1); renderPinDots(); el('pin-err').textContent = ''; return; }
  if (k === '✓') return;
  if (S.pin.length >= 4) return;
  S.pin += k;
  renderPinDots();
  if (S.pin.length === 4) verifyPin();
}
function renderPinDots() {
  const dots = el('pin-dots');
  dots.innerHTML = '';
  for (let i = 0; i < 4; i++) {
    const d = document.createElement('div');
    d.className = 'pin-dot' + (i < S.pin.length ? ' filled' : '');
    dots.appendChild(d);
  }
}
const COCKPIT_ALLOWED = new Set(['ADMIN001', 'GM001']);
async function verifyPin() {
  try {
    const r = await fetch(`/api/rectify?action=verify-staff&pin=${encodeURIComponent(S.pin)}`).then(r => r.json());
    if (!r.success) { el('pin-err').textContent = r.error || 'Wrong PIN'; S.pin = ''; renderPinDots(); return; }
    if (!COCKPIT_ALLOWED.has(r.code)) {
      el('pin-err').textContent = 'Access denied';
      S.pin = ''; renderPinDots(); return;
    }
    S.user = r.person; S.role = r.role; S.code = r.code;
    el('who-label').textContent = `${r.person} · ${r.code}`;
    el('pin-gate').classList.add('hidden');
    el('app').classList.remove('hidden');
    setPreset('today');
  } catch (e) {
    el('pin-err').textContent = 'Network error';
    S.pin = ''; renderPinDots();
  }
}
function logout() {
  clearAutoRefresh();
  S.pin = ''; S.user = null; S.role = null;
  el('app').classList.add('hidden');
  el('pin-gate').classList.remove('hidden');
  renderPinDots();
  el('pin-err').textContent = '';
}

// ────────────────────────────────────────────────
// Time presets
// ────────────────────────────────────────────────
function istMidnight(date) {
  const istOffset = 5.5*3600*1000;
  const ist = new Date(date.getTime() + istOffset);
  const mid = new Date(Date.UTC(ist.getUTCFullYear(), ist.getUTCMonth(), ist.getUTCDate()));
  return new Date(mid.getTime() - istOffset); // UTC instant of IST midnight
}
function setPreset(preset) {
  S.preset = preset;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === preset));
  const now = new Date();
  const todayMid = istMidnight(now);
  if (preset === 'last-1h') {
    S.from = new Date(now.getTime() - 3600*1000); S.to = now;
  } else if (preset === 'last-3h') {
    S.from = new Date(now.getTime() - 3*3600*1000); S.to = now;
  } else if (preset === 'morning-shift') {
    // Morning shift 6AM-2PM IST of today (or current if ongoing)
    S.from = new Date(todayMid.getTime() + 6*3600*1000);
    S.to = new Date(todayMid.getTime() + 14*3600*1000);
  } else if (preset === 'evening-shift') {
    // Evening shift 2PM-11PM IST of today
    S.from = new Date(todayMid.getTime() + 14*3600*1000);
    S.to = new Date(todayMid.getTime() + 23*3600*1000);
  } else if (preset === 'today') {
    S.from = todayMid; S.to = now;
  } else if (preset === 'yesterday') {
    S.from = new Date(todayMid.getTime() - 24*3600*1000);
    S.to = todayMid;
  } else if (preset === '7d') {
    S.from = new Date(now.getTime() - 7*24*3600*1000); S.to = now;
  }
  // Always sync inputs so user can see and tweak
  el('from-input').value = toLocalInput(S.from);
  el('to-input').value = toLocalInput(S.to);
  applyFilters();
}

// Typing in datetime inputs = custom override
['from-input','to-input'].forEach(id => {
  el(id).addEventListener('change', () => {
    S.preset = 'custom';
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  });
});
function toLocalInput(d) {
  const off = d.getTimezoneOffset() * 60000;
  return new Date(d - off).toISOString().slice(0, 16);
}

document.querySelectorAll('.preset-btn').forEach(b => b.onclick = () => setPreset(b.dataset.preset));
document.querySelectorAll('.tab').forEach(b => b.onclick = () => switchTab(b.dataset.tab));

function applyFilters() {
  // Global = time window only; POS/PM always fetch-all, filtering is tab-local.
  if (el('from-input').value) S.from = new Date(el('from-input').value);
  if (el('to-input').value) S.to = new Date(el('to-input').value);
  S.cache = {}; // invalidate fetch cache
  loadTab(S.tab);
  loadDiscrepancyBadge();
}

// ────────────────────────────────────────────────
// Filter helpers (per-tab)
// ────────────────────────────────────────────────
function arrEq(a, b) { return a.length === b.length && a.every(x => b.includes(x)); }
function countLocalFilters(tab) {
  const f = S[tab], d = DEF[tab];
  if (!f || !d) return 0;
  let n = 0;
  for (const k in d) {
    if (Array.isArray(d[k])) { if (!arrEq(f[k], d[k])) n++; }
    else if (f[k] !== d[k] && f[k] !== '' && f[k] !== false) n++;
  }
  return n;
}
function updateTabBadge(tab) {
  const map = {sum:'tc-summary', tl:'tc-timeline', ord:'tc-orders', rzp:'tc-razorpay', run:'tc-runners', disc:'tc-disc'};
  const badge = el(map[tab]);
  if (!badge) return;
  const n = countLocalFilters(tab);
  if (n > 0) { badge.textContent = n; badge.classList.remove('hidden'); badge.style.background = 'var(--amber)'; badge.style.color = '#000'; }
  else badge.classList.add('hidden');
}
function resetLocalFilters(tab) {
  S[tab] = JSON.parse(JSON.stringify(DEF[tab]));
  updateTabBadge(tab);
  loadTab(S.tab);
}
function toggleChip(arr, val) {
  const i = arr.indexOf(val);
  if (i >= 0) arr.splice(i, 1); else arr.push(val);
}
function onLocalChange(tab) { updateTabBadge(tab); loadTab(S.tab); }
// Expose for inline onclick handlers
window.toggleChip = toggleChip; window.onLocalChange = onLocalChange; window.resetLocalFilters = resetLocalFilters;
window.setLocal = (tab, key, val) => { S[tab][key] = val; onLocalChange(tab); };
window.setLocalArr = (tab, key, val) => { toggleChip(S[tab][key], val); onLocalChange(tab); };

function switchTab(tab) {
  S.tab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.pane').forEach(p => p.classList.add('hidden'));
  el('pane-' + tab).classList.remove('hidden');
  loadTab(tab);
  scheduleAutoRefresh();
}

function refreshTab() { S.cache = {}; loadTab(S.tab); loadDiscrepancyBadge(); }

function clearAutoRefresh() { if (S.autoTimer) { clearInterval(S.autoTimer); S.autoTimer = null; } }
function scheduleAutoRefresh() {
  clearAutoRefresh();
  if (el('auto-refresh')?.checked && S.tab === 'summary') {
    S.autoTimer = setInterval(() => { S.cache = {}; loadTab('summary'); loadDiscrepancyBadge(); }, 30000);
  }
}
el('auto-refresh').addEventListener('change', scheduleAutoRefresh);

// ────────────────────────────────────────────────
// API
// ────────────────────────────────────────────────
async function api(action, extra = {}) {
  const cacheKey = action + JSON.stringify(extra);
  if (S.cache[cacheKey]) return S.cache[cacheKey];
  const params = new URLSearchParams({
    action,
    from: S.from.toISOString(),
    to: S.to.toISOString(),
    pos_ids: S.pos_ids.join(','),
    pm_ids: S.pm_ids.join(','),
    ...extra,
  });
  const r = await fetch(`/api/cockpit?${params}`).then(r => r.json());
  if (r.success) S.cache[cacheKey] = r;
  return r;
}

// ────────────────────────────────────────────────
// Tab loaders
// ────────────────────────────────────────────────
async function loadTab(tab) {
  const pane = el('pane-' + tab);
  pane.innerHTML = '<div class="loading">Loading live data from Odoo + Razorpay…</div>';
  try {
    if (tab === 'summary') await renderSummary(pane);
    else if (tab === 'timeline') await renderTimeline(pane);
    else if (tab === 'orders') await renderOrders(pane);
    else if (tab === 'razorpay') await renderRazorpay(pane);
    else if (tab === 'runners') await renderRunners(pane);
    else if (tab === 'discrepancies') await renderDiscrepancies(pane);
  } catch (e) {
    pane.innerHTML = `<div class="card" style="border-color:var(--red);"><strong style="color:var(--red);">Error:</strong> ${escape(e.message)}</div>`;
  }
}

async function loadDiscrepancyBadge() {
  try {
    const r = await api('discrepancies');
    const badge = el('disc-badge');
    const criticalHigh = (r.issues || []).filter(i => ['critical','high'].includes(i.severity)).length;
    if (criticalHigh > 0) { badge.textContent = criticalHigh; badge.classList.remove('hidden'); }
    else badge.classList.add('hidden');
  } catch {}
}

// ────────────────────────────────────────────────
// TIMELINE
// ────────────────────────────────────────────────
async function renderTimeline(pane) {
  const r = await api('orders');
  if (!r.success) throw new Error(r.error);
  const f = S.tl;

  // Client-filter orders by POS, keep only matching PM payments
  const filtered = r.orders
    .filter(o => f.pos.includes(o.pos_id))
    .map(o => ({...o, payments: (o.payments||[]).filter(p => f.pms.includes(p.pm_id))}));

  // Bucket size in minutes
  const bucketMin = f.bucket === '15m' ? 15 : f.bucket === '30m' ? 30 : f.bucket === '4h' ? 240 : 60;

  // Bucket key: floor IST timestamp to bucketMin
  const buckets = {};
  for (const o of filtered) {
    const istTs = new Date(o.date_order + 'Z').getTime() + 5.5*3600*1000;
    const bucketTs = Math.floor(istTs / (bucketMin*60*1000)) * (bucketMin*60*1000);
    const key = new Date(bucketTs).toISOString(); // representative IST instant
    if (!buckets[key]) buckets[key] = {37:0,38:0,39:0,40:0,48:0,49:0};
    for (const p of o.payments) buckets[key][p.pm_id] = (buckets[key][p.pm_id]||0) + p.amount;
  }
  const keys = Object.keys(buckets).sort();
  let maxVal = 0;
  keys.forEach(k => { const sum = Object.values(buckets[k]).reduce((s,v)=>s+v,0); if (sum>maxVal) maxVal=sum; });

  const PM_COLORS = {37:'#22c55e',38:'#3b82f6',39:'#D4A44C',40:'#a855f7',48:'#f59e0b',49:'#8892a3'};
  const totalAmt = keys.reduce((s,k)=>s + Object.values(buckets[k]).reduce((a,b)=>a+b,0), 0);

  const filterStrip = `
    <div class="local-filters">
      <div class="lf-group">
        <label>POS</label>
        ${[27,28,29].map(p => `<button class="lf-btn ${f.pos.includes(p)?'on':''}" onclick="setLocalArr('tl','pos',${p})">${p} ${POS_NAMES[p]}</button>`).join('')}
      </div>
      <div class="lf-group">
        <label>PM</label>
        ${[37,38,39,40,48,49].map(p => `<button class="lf-btn ${f.pms.includes(p)?'on':''}" onclick="setLocalArr('tl','pms',${p})">${p} ${PM_NAMES[p]}</button>`).join('')}
      </div>
      <div class="lf-group">
        <label>Bucket</label>
        ${['15m','30m','1h','4h'].map(b => `<button class="lf-btn ${f.bucket===b?'on':''}" onclick="setLocal('tl','bucket','${b}')">${b}</button>`).join('')}
      </div>
      <span class="lf-count">${filtered.length} orders · ${fmtMoney(totalAmt)} · ${keys.length} buckets</span>
      <button class="lf-clear" onclick="resetLocalFilters('tl')">Clear</button>
    </div>
  `;

  pane.innerHTML = filterStrip + `
    <div class="timeline">
      <div style="display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; font-size:11px;">
        ${f.pms.map(pm => `<div><span style="display:inline-block; width:10px; height:10px; background:${PM_COLORS[pm]}; border-radius:2px; margin-right:4px;"></span>${PM_NAMES[pm]}</div>`).join('')}
      </div>
      ${keys.length === 0 ? '<div class="empty">No data matching filters</div>' : keys.map(k => {
        const istDate = new Date(k);
        const label = `${String(istDate.getUTCDate()).padStart(2,'0')}/${String(istDate.getUTCMonth()+1).padStart(2,'0')} ${String(istDate.getUTCHours()).padStart(2,'0')}:${String(istDate.getUTCMinutes()).padStart(2,'0')}`;
        const total = Object.values(buckets[k]).reduce((s,v) => s+v, 0);
        const rowPct = (total / maxVal) * 100;
        return `<div class="tl-row">
          <div class="tl-label">${label}</div>
          <div class="tl-bar" style="display:flex; width:${rowPct}%;">
            ${f.pms.map(pm => {
              const v = buckets[k][pm] || 0;
              if (!v) return '';
              const pct = (v / total) * 100;
              return `<div class="tl-fill" style="width:${pct}%; background:${PM_COLORS[pm]};" title="${PM_NAMES[pm]} ${fmtMoney(v)}"></div>`;
            }).join('')}
          </div>
          <div class="tl-val">${fmtMoney(total)}</div>
        </div>`;
      }).join('')}
    </div>
  `;
  updateTabBadge('tl');
}

async function renderOrders(pane) {
  const r = await api('orders');
  if (!r.success) throw new Error(r.error);
  const f = S.ord;

  const q = (f.search || '').toLowerCase();
  const min = f.minAmt === '' ? -Infinity : +f.minAmt;
  const max = f.maxAmt === '' ? Infinity : +f.maxAmt;

  const filtered = r.orders.filter(o => {
    if (!f.pos.includes(o.pos_id)) return false;
    const pms = (o.payments||[]).map(p => p.pm_id);
    if (pms.length && !pms.some(p => f.pms.includes(p))) return false;
    if (f.orphanOnly && pms.length > 0) return false;
    if (o.amount_total < min || o.amount_total > max) return false;
    if (q) {
      const hay = `${o.name} ${o.pos_reference||''} ${o.partner_name||''} ${o.cashier||''}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  const totalAmt = filtered.reduce((s,o)=>s+o.amount_total, 0);

  const filterStrip = `
    <div class="local-filters">
      <div class="lf-group">
        <label>POS</label>
        ${[27,28,29].map(p => `<button class="lf-btn ${f.pos.includes(p)?'on':''}" onclick="setLocalArr('ord','pos',${p})">${p} ${POS_NAMES[p]}</button>`).join('')}
      </div>
      <div class="lf-group">
        <label>PM</label>
        ${[37,38,39,40,48,49].map(p => `<button class="lf-btn ${f.pms.includes(p)?'on':''}" onclick="setLocalArr('ord','pms',${p})">${p} ${PM_NAMES[p]}</button>`).join('')}
      </div>
      <div class="lf-group">
        <label>Search</label>
        <input type="text" class="wide" id="ord-search" placeholder="name/ref/customer/cashier" value="${escape(f.search)}" oninput="setLocal('ord','search',this.value)">
      </div>
      <div class="lf-group">
        <label>₹ Min</label>
        <input type="number" id="ord-min" value="${f.minAmt}" placeholder="0" oninput="setLocal('ord','minAmt',this.value)">
      </div>
      <div class="lf-group">
        <label>₹ Max</label>
        <input type="number" id="ord-max" value="${f.maxAmt}" placeholder="∞" oninput="setLocal('ord','maxAmt',this.value)">
      </div>
      <div class="lf-group">
        <button class="lf-btn ${f.orphanOnly?'on':''}" onclick="setLocal('ord','orphanOnly',${!f.orphanOnly})">Orphans only</button>
      </div>
      <span class="lf-count">${filtered.length} / ${r.count} · ${fmtMoney(totalAmt)}</span>
      <button class="lf-clear" onclick="resetLocalFilters('ord')">Clear</button>
    </div>
  `;

  pane.innerHTML = filterStrip + `
    <div style="margin-bottom:10px; color:var(--muted); font-size:11px;">Click any row for drilldown.</div>
    <div class="table-wrap">
      <table>
        <thead><tr>
          <th>Time (IST)</th><th>Name</th><th>POS</th><th>Customer / Runner</th><th>Cashier</th>
          <th class="num">Amount</th><th>Payments</th>
        </tr></thead>
        <tbody>
          ${filtered.length === 0 ? '<tr><td colspan="7" class="empty">No orders matching filters</td></tr>' :
            filtered.map(o => `
              <tr style="cursor:pointer;" onclick="openDrilldown(${o.id})">
                <td class="code">${fmtTime(o.date_order + 'Z')}</td>
                <td><strong>${escape(o.name)}</strong></td>
                <td><span class="pill pill-info">${POS_NAMES[o.pos_id] || o.pos_id}</span></td>
                <td>${escape(o.partner_name || '—')}</td>
                <td class="code">${escape(o.cashier || '')}</td>
                <td class="num">${fmtMoney(o.amount_total)}</td>
                <td>${(o.payments||[]).map(p => `<span class="pill pill-mute" style="margin-right:3px;">${p.pm_name} ${fmtMoney(p.amount)}</span>`).join('') || '<span class="pill pill-crit">NO PAYMENT</span>'}</td>
              </tr>
            `).join('')}
        </tbody>
      </table>
    </div>
  `;
  updateTabBadge('ord');
  // Restore focus if user was typing in search
  const focused = document.activeElement?.id;
  if (focused === 'ord-search') { const inp = el('ord-search'); inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

          <tbody>${r.lines.map(l => `
            <tr><td>${escape(l.product)}</td><td class="num">${l.qty}</td><td class="num">${fmtMoney(l.price_unit)}</td><td class="num">${fmtMoney(l.subtotal)}</td><td class="num">${fmtMoney(l.subtotal_incl_tax)}</td><td class="code">${escape(l.note||'')}</td></tr>

        <table>
          <thead><tr><th>PM</th><th class="num">Amount</th><th>Payment Date (IST)</th><th>Txn</th></tr></thead>
          <tbody>${r.payments.map(p => `
            <tr><td><span class="pill pill-info">${p.pm_name}</span></td><td class="num">${fmtMoney(p.amount)}</td><td class="code">${fmtTime(p.payment_date + 'Z')}</td><td class="code">${escape(p.transaction_id||'')}</td></tr>

        </table>
      </div>
      ${o.note ? `<div class="card" style="margin-top:14px;"><h3>Order Note</h3><div>${escape(o.note)}</div></div>` : ''}
    `;
  } catch (e) {
    el('modal-content').innerHTML = `<div style="color:var(--red); padding:20px;">Error: ${escape(e.message)}</div>`;
  }
}
function closeModal() { el('modal').classList.remove('show'); }

// ────────────────────────────────────────────────
// RAZORPAY
// ────────────────────────────────────────────────
async function renderRazorpay(pane) {
  const r = await api('razorpay');
  if (!r.success) throw new Error(r.error);
  const f = S.rzp;

  const min = f.minAmt === '' ? -Infinity : +f.minAmt;
  const max = f.maxAmt === '' ? Infinity : +f.maxAmt;
  const vpa = (f.vpa||'').toLowerCase();
  const ord = (f.order||'').toLowerCase();

  const filtered = r.payments.filter(p => {
    if (!f.qrs.includes(p.qr_label)) return false;
    if (f.match !== 'all' && p.match_status !== f.match) return false;
    if (p.amount < min || p.amount > max) return false;
    if (vpa && !(p.payer_vpa||'').toLowerCase().includes(vpa)) return false;
    if (ord && !(p.odoo_order_name||'').toLowerCase().includes(ord)) return false;
    return true;
  });

  // Per-QR totals (from full dataset so user sees what they're filtering from)
  const qrStats = {};
  ['COUNTER','RUNNER_COUNTER','RUN001','RUN002','RUN003','RUN004','RUN005'].forEach(q => {
    const rows = r.payments.filter(p => p.qr_label === q);
    qrStats[q] = { count: rows.length, sum: rows.reduce((s,p)=>s+p.amount,0) };
  });

  const WALKIN = new Set(['COUNTER','RUNNER_COUNTER']);
  const totalAmt = filtered.reduce((s,p)=>s+p.amount,0);

  // Walk-in stats (match-eligible): counter + runner_counter only
  const walkin = filtered.filter(p => WALKIN.has(p.qr_label));
  const walkinSum = walkin.reduce((s,p)=>s+p.amount, 0);
  const walkinMatched = walkin.filter(p=>p.match_status==='matched').length;
  const walkinUnmatched = walkin.filter(p=>p.match_status==='unmatched').length;

  // Runner UPI (settlement credit): aggregated by runner code, NOT matched 1:1 to Odoo.
  // Logic: tokens are sold in bulk at the counter. Runner consumes them piecewise
  // in the field, customers pay the runner's QR. The total offsets the runner's
  // tokens+sales balance at settlement time.
  const runnerRows = filtered.filter(p => p.qr_label.startsWith('RUN'));
  const runnerAgg = {};
  runnerRows.forEach(p => { runnerAgg[p.qr_label] = (runnerAgg[p.qr_label]||{sum:0,count:0}); runnerAgg[p.qr_label].sum += p.amount; runnerAgg[p.qr_label].count++; });
  const runnerUpiTotal = runnerRows.reduce((s,p)=>s+p.amount, 0);

  const filterStrip = `
    <div class="local-filters">
      <div class="lf-group">
        <label>QR</label>
        ${['COUNTER','RUNNER_COUNTER','RUN001','RUN002','RUN003','RUN004','RUN005'].map(q =>
          `<button class="lf-btn ${f.qrs.includes(q)?'on':''}" onclick="setLocalArr('rzp','qrs','${q}')" title="${qrStats[q].count} pmts · ${fmtMoney(qrStats[q].sum)}">${q} <span style="opacity:0.6;">${qrStats[q].count}</span></button>`).join('')}
      </div>
      <div class="lf-group">
        <label>Match</label>
        ${[['all','All'],['matched','Matched'],['unmatched','Unmatched'],['not_applicable','N/A']].map(([k,lbl]) =>
          `<button class="lf-btn ${f.match===k?'on':''}" onclick="setLocal('rzp','match','${k}')">${lbl}</button>`).join('')}
      </div>
      <div class="lf-group">
        <label>₹ Min</label>
        <input type="number" value="${f.minAmt}" placeholder="0" oninput="setLocal('rzp','minAmt',this.value)">
      </div>
      <div class="lf-group">
        <label>₹ Max</label>
        <input type="number" value="${f.maxAmt}" placeholder="∞" oninput="setLocal('rzp','maxAmt',this.value)">
      </div>
      <div class="lf-group">
        <label>VPA</label>
        <input type="text" id="rzp-vpa" value="${escape(f.vpa)}" placeholder="e.g. @ybl" oninput="setLocal('rzp','vpa',this.value)">
      </div>
      <div class="lf-group">
        <label>Order</label>
        <input type="text" id="rzp-order" value="${escape(f.order)}" placeholder="Odoo name" oninput="setLocal('rzp','order',this.value)">
      </div>
      <span class="lf-count">${filtered.length} / ${r.count} · ${fmtMoney(totalAmt)}</span>
      <button class="lf-clear" onclick="resetLocalFilters('rzp')">Clear</button>
    </div>
  `;

  pane.innerHTML = filterStrip + `
    <div class="card" style="margin-bottom:12px; border-left:3px solid var(--amber); padding:12px 14px;">
      <div style="font-size:11px; color:var(--muted); line-height:1.6;">
        <strong style="color:var(--amber);">Two different QR flows — don't confuse them:</strong><br>
        <strong style="color:var(--text);">Counter / RunnerCounter QRs</strong> → Walk-in customer pays at the counter. Must match Odoo PM38 1:1 (amount + time). Mismatches = real discrepancy.<br>
        <strong style="color:var(--text);">Runner QRs (RUN001–005)</strong> → Tokens are sold in bulk at counter (POS27 PM48). Runner consumes them piecewise in the field; customers pay the runner's QR. No 1:1 Odoo match expected — the <em>total</em> offsets the runner's tokens + ledger at settlement time (see Runners tab).
      </div>
    </div>

    <div class="grid grid-4" style="margin-bottom:12px;">
      <div class="card"><h3>Shown</h3><div class="big amber">${filtered.length}</div><div class="sub">${fmtMoney(totalAmt)} · of ${r.count} total</div></div>
      <div class="card"><h3>Walk-in Matched</h3><div class="big green">${walkinMatched}</div><div class="sub">Counter + RunCtr · ${fmtMoney(walkin.filter(p=>p.match_status==='matched').reduce((s,p)=>s+p.amount,0))}</div></div>
      <div class="card"><h3>Walk-in Unmatched</h3><div class="big ${walkinUnmatched>0?'red':''}">${walkinUnmatched}</div><div class="sub">needs review · ${fmtMoney(walkin.filter(p=>p.match_status==='unmatched').reduce((s,p)=>s+p.amount,0))}</div></div>
      <div class="card"><h3>Runner UPI (field)</h3><div class="big">${fmtMoney(runnerUpiTotal)}</div><div class="sub">${runnerRows.length} pmts · offsets runner settlement</div></div>
    </div>

    ${Object.keys(runnerAgg).length > 0 ? `
    <div class="card" style="margin-bottom:12px;">
      <h3>Runner UPI · Per-Runner Aggregation (settlement credit)</h3>
      <table class="matrix-table">
        <tr><th>Runner</th><th class="num">Pmts</th><th class="num">UPI Collected</th><th></th></tr>
        ${['RUN001','RUN002','RUN003','RUN004','RUN005'].map(c => {
          const a = runnerAgg[c] || {sum:0, count:0};
          return `<tr><td><strong>${c}</strong></td><td class="num">${a.count}</td><td class="num">${fmtMoney(a.sum)}</td><td class="code" style="color:var(--muted);">subtracted from cash-to-collect at settlement</td></tr>`;
        }).join('')}
      </table>
    </div>` : ''}

    <div class="table-wrap">
      <table>
        <thead><tr><th>Captured (IST)</th><th>QR</th><th class="num">Amount</th><th>VPA</th><th>Reconciliation</th><th>Detail</th><th>Δ min</th></tr></thead>
        <tbody>
          ${filtered.length === 0 ? '<tr><td colspan="7" class="empty">No Razorpay payments matching filters</td></tr>' :
            filtered.map(p => {
              const isWalkin = WALKIN.has(p.qr_label);
              const pill = isWalkin
                ? (p.match_status === 'matched' ? '<span class="pill pill-ok">MATCHED</span>' : '<span class="pill pill-crit">UNMATCHED</span>')
                : `<span class="pill pill-info">→ ${p.qr_label} settlement</span>`;
              const detail = isWalkin
                ? `${escape(p.odoo_order_name || '—')} ${p.odoo_order_pos ? '· ' + p.odoo_order_pos : ''}`
                : `<span style="color:var(--muted);">field collection · not mapped to single order</span>`;
              const dMin = isWalkin ? (p.match_diff_min !== null ? p.match_diff_min + 'm' : '—') : '—';
              return `
              <tr ${isWalkin && p.odoo_order_id ? `style="cursor:pointer;" onclick="openDrilldown(${p.odoo_order_id})"` : ''}>
                <td class="code">${fmtTime(p.created_at)}</td>
                <td><span class="pill ${p.qr_label === 'COUNTER' ? 'pill-info' : p.qr_label === 'RUNNER_COUNTER' ? 'pill-warn' : 'pill-mute'}">${p.qr_label}</span></td>
                <td class="num">${fmtMoney(p.amount)}</td>
                <td class="code">${escape(p.payer_vpa || '')}</td>
                <td>${pill}</td>
                <td class="code">${detail}</td>
                <td class="num code">${dMin}</td>
              </tr>
            `;}).join('')}
        </tbody>
      </table>
    </div>
  `;
  updateTabBadge('rzp');
  const focused = document.activeElement?.id;
  if (focused === 'rzp-vpa' || focused === 'rzp-order') { const inp = el(focused); inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); }
}

// ────────────────────────────────────────────────
// RUNNERS
// ────────────────────────────────────────────────
async function renderRunners(pane) {
  const r = await api('runners');
  if (!r.success) throw new Error(r.error);
  const f = S.run;

  const filtered = r.runners.filter(x => {
    if (!f.codes.includes(x.code)) return false;
    if (f.variance === 'over' && x.variance <= 50) return false;
    if (f.variance === 'under' && x.variance >= -50) return false;
    if (f.variance === 'exact' && Math.abs(x.variance) > 50) return false;
    return true;
  });

  const totals = filtered.reduce((acc, x) => ({
    tokens: acc.tokens + x.tokens, sales: acc.sales + x.sales, upi: acc.upi + x.upi,
    expected: acc.expected + x.expected_cash, settled: acc.settled + x.actual_settled, variance: acc.variance + x.variance,
  }), {tokens:0, sales:0, upi:0, expected:0, settled:0, variance:0});

  const filterStrip = `
    <div class="local-filters">
      <div class="lf-group">
        <label>Runner</label>
        ${['RUN001','RUN002','RUN003','RUN004','RUN005'].map(c => {
          const row = r.runners.find(x => x.code === c);
          return `<button class="lf-btn ${f.codes.includes(c)?'on':''}" onclick="setLocalArr('run','codes','${c}')" title="${row ? 'Exp ' + fmtMoney(row.expected_cash) + ' · Var ' + fmtMoney(row.variance) : ''}">${c}</button>`;
        }).join('')}
      </div>
      <div class="lf-group">
        <label>Variance</label>
        ${[['all','All'],['over','Over +50'],['exact','Exact ±50'],['under','Under −50']].map(([k,lbl]) =>
          `<button class="lf-btn ${f.variance===k?'on':''}" onclick="setLocal('run','variance','${k}')">${lbl}</button>`).join('')}
      </div>
      <span class="lf-count">${filtered.length} / ${r.runners.length} · Exp ${fmtMoney(totals.expected)} · Var ${totals.variance>=0?'+':''}${fmtMoney(totals.variance)}</span>
      <button class="lf-clear" onclick="resetLocalFilters('run')">Clear</button>
    </div>
  `;

  pane.innerHTML = filterStrip + `
    <div class="table-wrap">
      <table>
        <thead><tr><th>Runner</th><th class="num">Tokens (PM48)</th><th class="num">Ledger (PM40)</th><th class="num">RZP UPI</th><th class="num">Expected Cash</th><th class="num">Settled (D1)</th><th class="num">Variance</th><th class="num">Settlements</th></tr></thead>
        <tbody>
          ${filtered.length === 0 ? '<tr><td colspan="8" class="empty">No runners matching filters</td></tr>' :
            filtered.map(x => `
            <tr>
              <td><strong>${x.code}</strong> <span class="code">#${x.partner_id}</span></td>
              <td class="num">${fmtMoney(x.tokens)}</td>
              <td class="num">${fmtMoney(x.sales)}</td>
              <td class="num">${fmtMoney(x.upi)} <span class="code">(${x.upi_count})</span></td>
              <td class="num"><strong>${fmtMoney(x.expected_cash)}</strong></td>
              <td class="num">${fmtMoney(x.actual_settled)}</td>
              <td class="num ${Math.abs(x.variance) > 50 ? 'red' : ''}" style="${Math.abs(x.variance) > 50 ? 'color:var(--red); font-weight:600;' : ''}">${x.variance >= 0 ? '+' : ''}${fmtMoney(x.variance)}</td>
              <td class="num">${x.settlement_count}</td>
            </tr>
          `).join('')}
          ${filtered.length > 0 ? `<tr style="background:var(--panel2); font-weight:600;">
            <td>Total (${filtered.length})</td>
            <td class="num">${fmtMoney(totals.tokens)}</td>
            <td class="num">${fmtMoney(totals.sales)}</td>
            <td class="num">${fmtMoney(totals.upi)}</td>
            <td class="num amber">${fmtMoney(totals.expected)}</td>
            <td class="num">${fmtMoney(totals.settled)}</td>
            <td class="num ${Math.abs(totals.variance) > 50 ? 'red' : ''}">${totals.variance>=0?'+':''}${fmtMoney(totals.variance)}</td>
            <td></td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>
    <div style="margin-top:12px; font-size:11px; color:var(--muted);">
      Expected cash = Tokens + Ledger − RZP UPI. Variance > ±₹50 needs review.
    </div>
  `;
  updateTabBadge('run');
}

// ────────────────────────────────────────────────
// DISCREPANCIES
// ────────────────────────────────────────────────
const DISC_TYPES = [
  ['upi_mismatch', 'UPI Mismatch'],
  ['silent_gaps', 'Silent Gaps'],
  ['late_batch', 'Late Batch'],
  ['invalid_mwr', 'Invalid MWR'],
  ['orphan_orders', 'Orphan Orders'],
  ['wrong_pm', 'Wrong PM'],
  ['d1_audits', 'D1 Audits'],
];
async function renderDiscrepancies(pane) {
  const r = await api('discrepancies');
  if (!r.success) throw new Error(r.error);
  const f = S.disc;

  // Defaults: if types empty, show all
  const allowedTypes = f.types.length === 0 ? DISC_TYPES.map(t=>t[0]) : f.types;
  const filtered = r.issues.filter(i => f.severity.includes(i.severity) && allowedTypes.includes(i.type));

  const typeCounts = {};
  r.issues.forEach(i => { typeCounts[i.type] = (typeCounts[i.type]||0) + 1; });
  const sevCounts = {critical:0, high:0, warning:0, info:0};
  r.issues.forEach(i => { sevCounts[i.severity] = (sevCounts[i.severity]||0) + 1; });

  const filterStrip = `
    <div class="local-filters">
      <div class="lf-group">
        <label>Severity</label>
        ${['critical','high','warning','info'].map(s =>
          `<button class="lf-btn ${f.severity.includes(s)?'on':''}" onclick="setLocalArr('disc','severity','${s}')">${s.toUpperCase()} <span style="opacity:0.6;">${sevCounts[s]||0}</span></button>`).join('')}
      </div>
      <div class="lf-group">
        <label>Type</label>
        ${DISC_TYPES.map(([k,lbl]) =>
          `<button class="lf-btn ${(f.types.length===0 || f.types.includes(k))?'on':''}" onclick="toggleDiscType('${k}')">${lbl} <span style="opacity:0.6;">${typeCounts[k]||0}</span></button>`).join('')}
      </div>
      <span class="lf-count">${filtered.length} / ${r.issues.length}</span>
      <button class="lf-clear" onclick="resetLocalFilters('disc')">Clear</button>
    </div>
  `;

  if (r.issues.length === 0) {
    pane.innerHTML = filterStrip + `<div class="card" style="text-align:center; padding:40px;">
      <div style="font-size:40px; color:var(--green); margin-bottom:8px;">✓</div>
      <div style="font-size:14px; font-weight:600; color:var(--green);">No discrepancies detected</div>
      <div style="color:var(--muted); font-size:11px; margin-top:6px;">Window checked: ${fmtTime(r.from)} → ${fmtTime(r.to)}</div>
    </div>`;
    updateTabBadge('disc');
    return;
  }

  pane.innerHTML = filterStrip + `
    <div style="margin-bottom:12px; color:var(--muted); font-size:11px;">
      Showing ${filtered.length} of ${r.issues.length} issue type(s). Click any row to expand evidence.
    </div>
    ${filtered.length === 0 ? '<div class="empty">No issues match filters</div>' : filtered.map((issue, i) => `
      <div class="issue ${issue.severity}">
        <div class="issue-head">
          <div class="issue-title">
            <span class="pill pill-${issue.severity === 'critical' ? 'crit' : issue.severity === 'high' ? 'crit' : issue.severity === 'warning' ? 'warn' : 'info'}">${issue.severity.toUpperCase()}</span>
            <span class="pill pill-mute" style="margin-right:4px;">${issue.type}</span>
            ${escape(issue.title)}
          </div>
          <button class="issue-expand" onclick="toggleEvidence(${i})">Show evidence (${issue.count})</button>
        </div>
        ${issue.amount ? `<div style="font-size:11px; color:var(--muted);">Impact: <strong style="color:var(--text);">${fmtMoney(issue.amount)}</strong></div>` : ''}
        <div class="issue-evidence" id="ev-${i}"><pre>${escape(JSON.stringify(issue.evidence, null, 2))}</pre></div>
      </div>
    `).join('')}
  `;
  updateTabBadge('disc');
}
function toggleEvidence(i) { el('ev-'+i).classList.toggle('show'); }
function toggleDiscType(k) {
  // If types is empty (meaning "all"), selecting one switches to explicit list minus that toggle off
  if (S.disc.types.length === 0) {
    S.disc.types = DISC_TYPES.map(t=>t[0]).filter(x => x !== k);
  } else if (S.disc.types.includes(k)) {
    S.disc.types = S.disc.types.filter(x => x !== k);
    if (S.disc.types.length === DISC_TYPES.length) S.disc.types = []; // back to "all"
  } else {
    S.disc.types.push(k);
    if (S.disc.types.length === DISC_TYPES.length) S.disc.types = [];
  }
  onLocalChange('disc');
}
window.toggleDiscType = toggleDiscType;

// ────────────────────────────────────────────────
// Keyboard shortcuts
// ────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (el('pin-gate').classList.contains('hidden') === false) {
    if (/^[0-9]$/.test(e.key)) pinKey(e.key);
    else if (e.key === 'Backspace') pinKey('⌫');
    return;
  }
  if (e.key === 'Escape') closeModal();
});

// Init
buildPinPad();
</script>
