<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Takht">
<meta name="theme-color" content="#020205">
<title>Takht · HN Hotels</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#020205; --e1:#14141c; --e2:#1c1c26; --e3:#26262f;
    --line:rgba(255,255,255,.10); --line-soft:rgba(255,255,255,.05);
    --text:#f8f8fa; --dim:#98989f; --mute:#5c5c66;
    --gold:#d4a24c; --gold-soft:rgba(212,162,76,.18); --gold-bd:rgba(212,162,76,.45);
    --takht:#c93838; --takht-soft:rgba(201,56,56,.16); --takht-bd:rgba(201,56,56,.50);
    --green:#34d399; --green-soft:rgba(52,211,153,.14);
    --red:#ff5c5c; --red-soft:rgba(255,92,92,.14);
    --amber:#fbbf24; --amber-soft:rgba(251,191,36,.14);
    --blue:#5e9eff;
    --safe-top:env(safe-area-inset-top,0px); --safe-bot:env(safe-area-inset-bottom,0px);
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:-apple-system,BlinkMacSystemFont,'SF Pro Text',system-ui,Inter,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;overscroll-behavior-y:contain;}
  /* hairline gold frame @ 18% inset */
  body::before{content:'';position:fixed;inset:6px;border:1px solid rgba(212,162,76,.18);border-radius:18px;pointer-events:none;z-index:99;}

  /* ── LOCKED PIN SHELL ── */
  .gate{position:fixed;inset:0;background:radial-gradient(120% 80% at 50% 18%,#0a0a0f 0%,#020205 70%);
    display:flex;flex-direction:column;align-items:center;z-index:60;padding:calc(var(--safe-top) + 12vh) 24px calc(var(--safe-bot) + 20px);}
  .icon-tile{width:72px;height:72px;border-radius:16px;background:#0e0e14;border:1px solid var(--takht-bd);
    display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;font-size:38px;color:var(--takht);box-shadow:0 6px 24px rgba(201,56,56,.15);}
  .chamber{font-family:var(--serif);font-weight:700;font-size:56px;line-height:1.05;color:#fff;margin:20px 0 6px;letter-spacing:.01em;}
  .tagline{font-family:var(--serif);font-style:italic;font-weight:500;font-size:15px;color:var(--gold);margin-bottom:30px;}
  .dots{display:flex;gap:16px;margin-bottom:34px;}
  .dot{width:12px;height:12px;border-radius:50%;border:1.5px solid rgba(212,162,76,.6);}
  .dot.on{background:var(--takht);border-color:var(--takht);box-shadow:0 0 8px rgba(201,56,56,.5);}
  .keypad{display:grid;grid-template-columns:repeat(3,68px);gap:22px;}
  .key{width:68px;height:68px;border-radius:50%;background:#1c1c26;color:#fff;font-size:26px;font-weight:400;
    display:flex;align-items:center;justify-content:center;border:none;}
  .key:active{background:#26262f;transform:scale(.94);}
  .key.blank{background:transparent;} .key.back{font-size:22px;color:var(--dim);background:transparent;}
  .footer{font-family:var(--serif);font-style:italic;font-size:11px;color:rgba(212,162,76,.5);margin-top:auto;padding-top:28px;}
  .gerr{color:var(--red);font-size:13px;min-height:16px;margin-top:14px;}

  /* ── APP ── */
  #app{display:none;padding:calc(var(--safe-top) + 14px) 16px calc(var(--safe-bot) + 48px);max-width:560px;margin:0 auto;}
  .top{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
  .top .ti{width:30px;height:30px;border-radius:8px;background:#0e0e14;border:1px solid var(--takht-bd);display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-weight:700;color:var(--takht);font-size:17px;}
  .top h1{font-family:var(--serif);font-weight:700;font-size:34px;color:#fff;margin:0;}
  .sub{color:var(--dim);font-size:12.5px;margin:0 0 16px 40px;}
  .card{background:var(--e1);border:.5px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;}
  .card h2{font-size:11px;letter-spacing:.09em;text-transform:uppercase;color:var(--mute);margin:0 0 12px;font-weight:700;}
  .row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:.5px solid var(--line-soft);}
  .row:last-child{border-bottom:none;} .row .k{color:var(--dim);font-size:14px;} .row .v{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;}
  .big{font-size:40px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:-.02em;margin:2px 0;}
  .muted{color:var(--mute);font-size:12px;}
  .chain{display:flex;align-items:center;justify-content:space-between;margin:4px 0 12px;}
  .node{flex:1;text-align:center;font-size:11px;color:var(--dim);} .node b{display:block;color:var(--text);font-size:13px;font-weight:700;}
  .arrow{color:var(--takht);font-size:16px;padding:0 4px;}
  .flag{display:flex;gap:10px;align-items:flex-start;padding:12px;border-radius:12px;margin-bottom:8px;font-size:14px;line-height:1.42;}
  .flag.red{background:var(--red-soft);border:.5px solid rgba(255,92,92,.3);} .flag.amber{background:var(--amber-soft);border:.5px solid rgba(251,191,36,.3);} .flag.green{background:var(--green-soft);border:.5px solid rgba(52,211,153,.3);}
  .flag .dot2{width:9px;height:9px;border-radius:50%;margin-top:5px;flex:none;} .flag.red .dot2{background:var(--red);} .flag.amber .dot2{background:var(--amber);} .flag.green .dot2{background:var(--green);}
  .flag .ttl{font-weight:700;} .flag .cz{color:var(--dim);font-size:13px;margin-top:2px;}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;}
  .pill.red{background:var(--red-soft);color:var(--red);} .pill.amber{background:var(--amber-soft);color:var(--amber);} .pill.green{background:var(--green-soft);color:var(--green);}
  input.count{width:100%;background:var(--e2);border:.5px solid var(--line);border-radius:12px;color:#fff;font-size:17px;padding:12px;text-align:center;font-variant-numeric:tabular-nums;margin-top:10px;}
  .refresh{color:var(--takht);font-size:13px;text-align:center;padding:14px;font-weight:600;}
  .loading{color:var(--mute);text-align:center;padding:34px;font-family:var(--serif);font-style:italic;font-size:16px;}
</style>
</head>
<body>

<!-- ── LOCKED PIN SHELL ── -->
<section class="gate" id="gate">
  <div class="icon-tile">t</div>
  <div class="chamber">Takht</div>
  <div class="tagline">the seat where revenue lands</div>
  <div class="dots" id="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
  <div class="keypad" id="keypad"></div>
  <div class="gerr" id="gerr"></div>
  <div class="footer">HN Hotels · since 1918</div>
</section>

<!-- ── APP ── -->
<div id="app">
  <div class="top"><div class="ti">t</div><h1>Takht</h1></div>
  <div class="sub" id="sub">Nawabi Chai House · settlement</div>
  <div id="content"><div class="loading">opening the court…</div></div>
  <div class="refresh" onclick="load()">↻ refresh</div>
</div>

<script>
const API='/api';
let buf='';
const dots=()=>{ const d=document.querySelectorAll('#dots .dot'); d.forEach((x,i)=>x.classList.toggle('on',i<buf.length)); };
function keyTap(v){
  const e=document.getElementById('gerr'); e.textContent='';
  if(v==='back'){ buf=buf.slice(0,-1); dots(); return; }
  if(buf.length>=4) return;
  buf+=v; dots();
  if(buf.length===4) submit();          /* auto-submit on 4th digit — NO enter button */
}
async function submit(){
  const pin=buf, e=document.getElementById('gerr');
  try{
    const r=await fetch(`${API}/settlement?action=verify-pin&pin=${encodeURIComponent(pin)}`).then(r=>r.json());
    if(r&&r.success){ localStorage.setItem('takht_pin',pin); document.getElementById('gate').style.display='none';
      document.getElementById('app').style.display='block'; load(); }
    else { e.textContent='Invalid PIN'; buf=''; dots(); }
  }catch(err){ e.textContent='Connection error'; buf=''; dots(); }
}
(function buildKeypad(){
  const kp=document.getElementById('keypad');
  const keys=['1','2','3','4','5','6','7','8','9','blank','0','back'];
  keys.forEach(k=>{ const b=document.createElement('button');
    if(k==='blank'){ b.className='key blank'; }
    else if(k==='back'){ b.className='key back'; b.textContent='⌫'; b.onclick=()=>keyTap('back'); }
    else { b.className='key'; b.textContent=k; b.onclick=()=>keyTap(k); }
    kp.appendChild(b);
  });
})();
if(localStorage.getItem('takht_pin')){ document.getElementById('gate').style.display='none'; document.getElementById('app').style.display='block'; }

async function get(p){ try{ return await fetch(`${API}/${p}`).then(r=>r.json()); }catch(e){ return {success:false}; } }
const rupee=n=>'₹'+Math.round(n||0).toLocaleString('en-IN');

async function load(){
  const c=document.getElementById('content'); c.innerHTML='<div class="loading">opening the court…</div>';
  const [bal,prev,rzp,tok,shift]=await Promise.all([
    get('settlement?action=counter-balance'), get('settlement?action=shift-preview'),
    get('validator?action=razorpay-verify'), get('token-settlement?action=get-status'),
    get('settlement?action=current-shift') ]);
  const flags=[]; let html='';
  const b=(bal&&bal.balance)||{};
  const counter=b.counterCash||0, runner=b.runnerCash||0, exp=b.totalExpenses||0, total=b.total||0;

  // ── THE CHAIN: Runners → Cashier → You ──
  html+=`<div class="card"><h2>Settlement chain · since last sweep</h2>
    <div class="chain">
      <div class="node"><b>Runners</b>${rupee(runner)}</div><div class="arrow">→</div>
      <div class="node"><b>Cashier</b>${rupee(counter)}</div><div class="arrow">→</div>
      <div class="node" style="color:var(--takht)"><b style="color:var(--takht)">You</b>${rupee(total)}</div>
    </div>
    <div class="big">${rupee(total)}</div>
    <div class="muted" style="margin-bottom:6px">cash that should reach your hand</div>
    <div class="row"><span class="k">Cash expenses</span><span class="v">${exp===0?'<span class="pill green">₹0 · UPI-only ✓</span>':rupee(exp)+' <span class="pill amber">check</span>'}</span></div>
    <div class="muted" style="margin-top:8px">Count the physical cash, enter it — Takht shows the variance before you take it.</div>
    <input class="count" id="counted" type="tel" inputmode="numeric" placeholder="cash counted" oninput="variance(${total})">
    <div id="varOut" class="muted" style="margin-top:8px"></div></div>`;
  if(exp>0) flags.push(['amber','Cash expenses present ('+rupee(exp)+')','New regime is UPI-only — any cash out of the drawer needs a reason.']);

  // ── UPI: Razorpay vs POS ──
  if(rzp&&rzp.snapshots){
    html+='<div class="card"><h2>UPI · Razorpay vs POS</h2>';
    rzp.snapshots.forEach(s=>{ const gap=(s.excess||0)-(s.deficit||0), off=Math.abs(gap)>1;
      html+=`<div class="row"><span class="k">${s.entity}${s.is_runner_qr?' <span class="muted">(runner)</span>':''}</span>
        <span class="v">${rupee(s.razorpay)}<span class="muted">/r</span> ${rupee(s.pos_upi)}<span class="muted">/p</span>
        ${off?'<span class="pill red">'+(gap>0?'+':'')+rupee(gap)+'</span>':'<span class="pill green">✓</span>'}</span></div>`; });
    html+='</div>';
    (rzp.discrepancies||[]).forEach(d=>flags.push(['red',`${d.entity}: UPI ${d.type} ${rupee(d.amount)}`,
      d.type==='excess'?'Money on this QR that POS didn’t record — a sale not scanned to the runner (NOT a tip), or a tender mis-tag.'
                       :'POS shows UPI that Razorpay never received — cash marked as UPI, or paid to the wrong QR.']));
  }

  // ── INVENTORY · LAYER 1 (chai live via token box; item-missing = sale-missing) ──
  if(tok&&tok.lastSettlement){ const t=tok.lastSettlement, disc=t.discrepancy||0;
    html+=`<div class="card"><h2>Inventory · Layer 1 — chai</h2>
      <div class="row"><span class="k">Weighed tokens</span><span class="v">${t.token_count}</span></div>
      <div class="row"><span class="k">POS beverages</span><span class="v">${t.odoo_total_beverages}</span></div>
      <div class="row"><span class="k">Gap</span><span class="v">${disc>0?'+':''}${disc} ${Math.abs(disc)>20?'<span class="pill amber">leak?</span>':'<span class="pill green">ok</span>'}</span></div>
      <div class="muted" style="margin-top:6px">${t.notes||''}</div>
      <div class="muted" style="margin-top:8px">Snack/bun count-check (a bun gone with no bun sale = a missed sale) wires in next — Frigate is Layer 2.</div></div>`;
    if(disc>20) flags.push(['amber',`Chai gap: +${disc} tokens vs POS`,'More chai physically left than POS recorded — chai served without a bill.']);
  }

  // ── SESSION (B1.1) ──
  const sh=(shift&&shift.current)||{};
  if(sh.shift_minutes){ const days=Math.floor(sh.shift_minutes/1440);
    html+=`<div class="card"><h2>POS session</h2>
      <div class="row"><span class="k">Cashier</span><span class="v">${sh.name||'—'}</span></div>
      <div class="row"><span class="k">Open for</span><span class="v">${days} days ${days>1?'<span class="pill red">never closed</span>':'<span class="pill green">ok</span>'}</span></div></div>`;
    if(days>1) flags.push(['red',`POS session open ${days} days`,'Close it at this settlement so cash reconciles to a clean day.']);
  }

  // ── FLAGS (read to staff) — placed first ──
  let f='<div class="card"><h2>What was missed — read to staff</h2>';
  if(!flags.length) f+='<div class="flag green"><span class="dot2"></span><div><div class="ttl">All clean</div><div class="cz">Every rupee maps to a destination. Take the cash.</div></div></div>';
  else flags.forEach(x=>f+=`<div class="flag ${x[0]}"><span class="dot2"></span><div><div class="ttl">${x[1]}</div><div class="cz">${x[2]}</div></div></div>`);
  f+='</div>';
  c.innerHTML=f+html;
  if(sh.name) document.getElementById('sub').textContent=`Nawabi Chai House · ${sh.name} · ${new Date().toLocaleTimeString('en-IN')}`;
}
function variance(expected){
  const el=document.getElementById('counted'); if(!el.value){ document.getElementById('varOut').textContent=''; return; }
  const d=parseFloat(el.value||'0')-expected, o=document.getElementById('varOut');
  if(Math.abs(d)<=2) o.innerHTML='<span class="pill green">matches ✓</span> take the cash.';
  else if(d<0) o.innerHTML=`<span class="pill red">short ${rupee(-d)}</span> — cash missing vs expected. Don’t take yet — find it.`;
  else o.innerHTML=`<span class="pill amber">over ${rupee(d)}</span> — extra cash; a sale not scanned to a runner (not a tip), or a mis-tag.`;
}
</script>
</body>
</html>
