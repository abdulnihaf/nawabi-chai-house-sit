<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--s3:#1f2030;
  --bd:#2a2a3a;--bd2:#353550;
  --tx:#e0e0e8;--dm:#7878a0;--dm2:#9898b8;
  --ac:#d4a44c;--ac2:#e8c07a;

}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;font-size:14px}

/* PIN */
#pin-gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:0}
#pin-gate.hidden{display:none}
.pg-brand{font-size:.7rem;letter-spacing:3px;text-transform:uppercase;color:var(--ac);margin-bottom:2rem}
.pg-title{font-size:1.1rem;color:var(--dm2);font-weight:400;margin-bottom:2rem}
.pg-dots{display:flex;gap:14px;margin-bottom:2rem}
.pg-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--bd);transition:all .2s}
.pg-dot.filled{background:var(--ac);border-color:var(--ac)}
.pg-pad{display:grid;grid-template-columns:repeat(3,68px);gap:10px}
.pg-btn{height:54px;border-radius:10px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:1.2rem;cursor:pointer;transition:all .15s;font-weight:500}
.pg-btn:active,.pg-btn:focus{background:var(--ac);color:var(--bg);border-color:var(--ac);outline:none}
.pg-err{color:var(--rd);font-size:.8rem;margin-top:1rem;height:1.2rem;text-align:center}

/* APP */
#app{display:none;max-width:960px;margin:0 auto;padding:1rem 1rem 5rem}
#app.show{display:block}

/* HEADER */
.hdr{text-align:center;padding:1.75rem 0 1.25rem;border-bottom:1px solid var(--bd);margin-bottom:1.5rem}
.hdr .brand{font-size:.65rem;letter-spacing:3px;text-transform:uppercase;color:var(--ac);margin-bottom:.4rem}
.hdr h1{font-size:1.15rem;font-weight:700;color:var(--tx)}
.hdr .meta{font-size:.8rem;color:var(--dm);margin-top:.3rem}

/* SUMMARY CARDS */
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
@media(max-width:580px){.cards{grid-template-columns:1fr 1fr}}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:1rem}
.card .clabel{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:.3rem}
.card .cval{font-size:1.45rem;font-weight:700;letter-spacing:-.5px}
.card .csub{font-size:.7rem;color:var(--dm);margin-top:.2rem}
.card.grand{grid-column:1/-1;text-align:center;background:var(--s2);border-color:var(--bd2)}
.card.grand .cval{font-size:1.75rem;color:var(--ac)}

/* BREAKDOWN BAR */
.breakdown-section{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.breakdown-section h2{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:1rem}
.bk-row{margin-bottom:.85rem}
.bk-label{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:.3rem}
.bk-name{font-size:.85rem;font-weight:500;color:var(--tx)}
.bk-name .vendor{font-size:.7rem;color:var(--dm);margin-left:.4rem;font-weight:400}
.bk-amt{font-size:.85rem;font-weight:700;font-variant-numeric:tabular-nums}
.bk-track{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.bk-fill{height:100%;border-radius:3px;transition:width .6s ease}
.bk-pct{font-size:.65rem;color:var(--dm);margin-top:.2rem}
.bk-divider{border:none;border-top:1px solid var(--bd);margin:.5rem 0 1rem}

/* SECTION ACCORDIONS */
.sec{border:1px solid var(--bd);border-radius:12px;margin-bottom:.75rem;overflow:hidden}
.sec-hdr{display:flex;align-items:center;padding:.9rem 1rem;cursor:pointer;user-select:none;background:var(--s1);transition:background .15s;gap:.75rem}
.sec-hdr:hover{background:var(--s2)}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.sec-info{flex:1;min-width:0}
.sec-title{font-size:.9rem;font-weight:600;color:var(--tx)}
.sec-sub{font-size:.72rem;color:var(--dm);margin-top:.1rem}
.sec-right{text-align:right;flex-shrink:0}
.sec-amt{font-size:1rem;font-weight:700;font-variant-numeric:tabular-nums}
.sec-entries{font-size:.7rem;color:var(--dm);margin-top:.1rem}
.sec-chev{color:var(--dm);font-size:.8rem;margin-left:.5rem;transition:transform .25s;flex-shrink:0}
.sec.open .sec-chev{transform:rotate(180deg)}
.sec-body{display:none;border-top:1px solid var(--bd)}
.sec.open .sec-body{display:block}
.sec-inner{padding:1rem}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:.8rem}
th{text-align:left;color:var(--dm);font-size:.68rem;text-transform:uppercase;letter-spacing:.5px;padding:.5rem .6rem;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--s2)}
td{padding:.45rem .6rem;border-bottom:1px solid rgba(42,42,58,.6);color:var(--tx)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--s2)}
.r{text-align:right;font-variant-numeric:tabular-nums;font-family:'Courier New',mono}
.bold{font-weight:700}
.muted{color:var(--dm);font-size:.72rem}
.tot-row td{background:var(--s2);font-weight:700;color:var(--tx);border-top:1px solid var(--bd2);border-bottom:none}
.scroll{max-height:440px;overflow-y:auto;border:1px solid var(--bd);border-radius:8px}
.scroll::-webkit-scrollbar{width:5px}
.scroll::-webkit-scrollbar-track{background:var(--s1)}
.scroll::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:3px}

/* TAGS */
.tag{display:inline-block;font-size:.62rem;font-weight:600;padding:1px 6px;border-radius:4px;vertical-align:middle;margin-left:4px}
.tag-neft{background:rgba(59,130,246,.15);color:#60a5fa}
.tag-chq{background:rgba(168,85,247,.15);color:#c084fc}
.tag-jrn{background:rgba(6,182,212,.15);color:#22d3ee}
.tag-pay{background:rgba(34,197,94,.15);color:#4ade80}
.tag-warn{background:rgba(239,68,68,.15);color:#f87171}

/* SHARIFF CATEGORY */
.sh-cat{border:1px solid var(--bd);border-radius:8px;margin-bottom:.6rem;overflow:hidden}
.sh-cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem .9rem;background:var(--s2);cursor:pointer;user-select:none}
.sh-cat-hdr:hover{background:var(--s3)}
.sh-cat-name{font-size:.82rem;font-weight:600;color:var(--tx)}
.sh-cat-total{font-size:.82rem;font-weight:700;color:var(--ac)}
.sh-cat-body{display:none}
.sh-cat.open .sh-cat-body{display:block}

/* PILL INFO */
.pill-row{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.75rem}
.pill{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:.25rem .75rem;font-size:.72rem;color:var(--dm2)}
.pill strong{color:var(--tx)}

/* NOTE BOX */
.note{background:var(--s2);border-left:3px solid var(--ac);border-radius:0 6px 6px 0;padding:.65rem .9rem;font-size:.75rem;color:var(--dm2);margin-bottom:.75rem;line-height:1.6}

/* KG HIGHLIGHT */

.month-hdr{padding:.35rem .6rem;background:var(--s3);font-size:.72rem;font-weight:600;color:var(--ac);letter-spacing:.5px;border-bottom:1px solid var(--bd)}

function pin(v){

  else if(pinEntry.length<4){pinEntry+=v}
  document.getElementById('pg-err').textContent='';
  for(var i=0;i<4;i++) document.getElementById('d'+i).classList.toggle('filled',i<pinEntry.length);
  if(pinEntry.length===4){
    if(PINS.indexOf(pinEntry)>=0){
      document.getElementById('pin-gate').classList.add('hidden');
      document.getElementById('app').classList.add('show');
      render();

/* ===== FORMAT ===== */
function rs(n){
  if(n==null||isNaN(n))return'–';
  var neg=n<0; n=Math.abs(Math.round(n));
  var s=String(n),r='',i=s.length;
  r=s.slice(Math.max(0,i-3)); i=i-3;
  while(i>0){r=s.slice(Math.max(0,i-2),i)+','+r; i-=2;}
  return (neg?'-':'')+'₹'+r;
}
function dt(d){
  if(!d)return'–';
  var p=d.split('-'),m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return p[2]+' '+m[+p[1]-1];
}

  h+='</div>';
  SHARIFF.cats.forEach(function(cat,ci){
    var pct=Math.round(cat.total/SHARIFF.total*100);
    h+='<div class="sh-cat">'+
      '<div class="sh-cat-hdr">'+
        '<span class="sh-cat-name" style="color:'+cat.color+'">'+cat.name+'</span>'+
        '<span style="display:flex;align-items:center;gap:.75rem">'+
          '<span class="muted" style="font-size:.72rem">'+pct+'%</span>'+
          '<span class="sh-cat-total">'+rs(cat.total)+'</span>'+
          '<span class="muted">▼</span>'+
        '</span>'+
      '</div>'+
      '<div class="sh-cat-body">'+
        '<table><thead><tr><th>Item</th><th>Unit</th><th class="r">Entries</th><th class="r">Total</th></tr></thead><tbody>';
    cat.items.forEach(function(item){
      var note=item.note?'<br><span class="muted" style="font-size:.68rem">'+item.note+'</span>':'';
      h+='<tr><td>'+item.n+note+'</td><td class="muted">'+item.u+'</td><td class="r muted">'+item.cnt+'</td><td class="r bold">'+rs(item.amt)+'</td></tr>';
    });
    h+='<tr class="tot-row"><td colspan="3">'+cat.name+' Total</td><td class="r">'+rs(cat.total)+'</td></tr>';
    h+='</tbody></table></div></div>';
  });
  h+='<div class="note" style="margin-top:.75rem">Grand Total: <strong>'+rs(SHARIFF.total)+'</strong> across 11 categories, 572 items</div>';
  return h;
}

/* BUTTER */
function renderButter(){
  var total=BUTTER.reduce(function(s,r){return s+r.amt},0);
  var impliedKg=Math.round(total/580*10)/10;
  var h='<div class="note"><strong>43 daily DayBook Payment entries.</strong> No kg quantity or vendor name on any entry. Consistent ₹500–₹3,100/day. At NCH butter rate ₹580/kg → implied <strong>~'+impliedKg+' kg</strong> over 57 days = '+Math.round(impliedKg/57*10)/10+' kg/day avg.</div>';
  h+='<div class="pill-row">'+
    '<span class="pill"><strong>43</strong> entries</span>'+
    '<span class="pill"><strong>'+rs(total)+'</strong> total</span>'+
    '<span class="pill">~<strong>'+impliedKg+'</strong> kg implied @₹580/kg</span>'+
    '<span class="pill">~<strong>'+Math.round(impliedKg/57*10)/10+'</strong> kg/day avg</span>'+
  '</div>';
  h+='<div class="scroll"><table><thead><tr><th>Date</th><th class="r">Amount</th></tr></thead><tbody>';
  var lastM='';
  BUTTER.forEach(function(r){
    var m=r.d.slice(0,7);
    if(m!==lastM){h+='<tr style="background:var(--s3)"><td class="muted" style="font-size:.7rem;padding:.3rem .6rem" colspan="2">'+(m==='2026-02'?'February 2026':'March 2026')+'</td></tr>';lastM=m;}
    h+='<tr><td class="muted">'+dt(r.d)+'</td><td class="r bold">'+rs(r.amt)+'</td></tr>';
  });
  h+='<tr class="tot-row"><td>Total (43 entries)</td><td class="r">'+rs(total)+'</td></tr>';
  h+='</tbody></table></div>';
  return h;
}

/* VEG */
function renderVeg(){

    var m=r.d.slice(0,7);

function renderSMP(){
  var total=SMP.reduce(function(s,r){return s+r.amt},0);

    h+='<tr><td class="muted">'+dt(r.d)+'</td><td>'+tag+' <span class="muted" style="font-size:.72rem">'+r.narr+'</span></td><td class="r bold">'+rs(r.amt)+'</td><td class="r muted">~'+Math.round(r.amt/310)+' kg SMP</td></tr>';
  });
  h+='<tr class="tot-row"><td colspan="2">Total (5 entries)</td><td class="r">'+rs(total)+'</td><td class="r muted">~'+Math.round(total/310)+' kg</td></tr>';
  h+='</tbody></table>';
  return h;
}
