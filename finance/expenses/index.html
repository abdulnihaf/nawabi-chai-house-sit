<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HN Hotels - Historical Expense View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--bd:#2a2a3a;--tx:#e0e0e8;--dm:#8888a0;--ac:#d4a44c;--gn:#22c55e;--rd:#ef4444;--or:#f97316;--bl:#3b82f6}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;min-height:100vh}
a{color:var(--ac);text-decoration:none}

/* PIN GATE */
#pin-gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;flex-direction:column}
#pin-gate.hidden{display:none}
#pin-gate h2{font-size:1.25rem;color:var(--dm);margin-bottom:1.5rem;font-weight:400}
#pin-gate .pin-dots{display:flex;gap:12px;margin-bottom:1.5rem}
#pin-gate .pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--bd);transition:all .2s}
#pin-gate .pin-dot.filled{background:var(--ac);border-color:var(--ac)}
#pin-gate .pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
#pin-gate .pin-btn{height:56px;border-radius:12px;border:1px solid var(--bd);background:var(--s1);color:var(--tx);font-size:1.25rem;cursor:pointer;transition:all .15s}
#pin-gate .pin-btn:active{background:var(--ac);color:var(--bg)}
#pin-gate .pin-error{color:var(--rd);font-size:.875rem;margin-top:1rem;height:1.25rem}

/* MAIN */
#app{display:none;max-width:960px;margin:0 auto;padding:1rem 1rem 6rem}
#app.show{display:block}

.header{text-align:center;padding:1.5rem 0;border-bottom:1px solid var(--bd);margin-bottom:1.5rem}
.header h1{font-size:1.1rem;color:var(--ac);font-weight:600;letter-spacing:.5px}
.header .sub{font-size:.85rem;color:var(--dm);margin-top:.35rem}

/* BUCKET CARDS */
.buckets{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:.75rem}
@media(max-width:600px){.buckets{grid-template-columns:1fr}}
.bucket-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:1rem;text-align:center}
.bucket-card .label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--dm);margin-bottom:.35rem}
.bucket-card .val{font-size:1.5rem;font-weight:700}
.bucket-card .val.capex{color:var(--or)}
.bucket-card .val.fixed{color:var(--bl)}
.bucket-card .val.variable{color:var(--gn)}
.bucket-card .count{font-size:.75rem;color:var(--dm);margin-top:.2rem}

.grand-total{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:.75rem;text-align:center;margin-bottom:2rem}
.grand-total .label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--dm)}
.grand-total .val{font-size:1.75rem;font-weight:700;color:var(--ac)}

/* SECTIONS */
.section{margin-bottom:1.5rem}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:var(--s1);border:1px solid var(--bd);border-radius:10px;cursor:pointer;user-select:none;transition:background .15s}
.section-header:hover{background:var(--s2)}
.section-header h2{font-size:.95rem;font-weight:600}
.section-header .toggle{color:var(--dm);font-size:1.2rem;transition:transform .2s}
.section-header.open .toggle{transform:rotate(180deg)}
.section-body{display:none;padding:.5rem 0}
.section-body.open{display:block}

/* CATEGORY LIST */
.cat-row{display:flex;align-items:center;padding:.6rem 1rem;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .1s;gap:.75rem}
.cat-row:hover{background:var(--s1)}
.cat-row:last-child{border-bottom:none}
.cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cat-dot.variable{background:var(--gn)}
.cat-dot.fixed{background:var(--bl)}
.cat-dot.capex{background:var(--or)}
.cat-dot.non_expense{background:var(--dm)}
.cat-name{flex:1;font-size:.85rem}
.cat-count{font-size:.75rem;color:var(--dm);min-width:40px;text-align:right}
.cat-total{font-size:.85rem;font-weight:600;min-width:90px;text-align:right}
.cat-arrow{color:var(--dm);font-size:.75rem;margin-left:.5rem;transition:transform .2s}
.cat-row.open .cat-arrow{transform:rotate(90deg)}

/* EXPANDED DETAIL */
.cat-detail{display:none;background:var(--s1);border:1px solid var(--bd);border-radius:8px;margin:0 .5rem .5rem;padding:.75rem}
.cat-detail.open{display:block}
.detail-table{width:100%;border-collapse:collapse;font-size:.8rem}
.detail-table th{text-align:left;color:var(--dm);font-weight:500;padding:.4rem .5rem;border-bottom:1px solid var(--bd);font-size:.7rem;text-transform:uppercase;letter-spacing:.5px}
.detail-table td{padding:.35rem .5rem;border-bottom:1px solid rgba(42,42,58,.5)}
.detail-table tr:last-child td{border-bottom:none}
.detail-table .amt{text-align:right;font-variant-numeric:tabular-nums}
.detail-table .date{color:var(--dm);white-space:nowrap}
.detail-table .narr{color:var(--dm);font-size:.7rem;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.sub-section{margin-top:1rem;padding-top:.75rem;border-top:1px solid var(--bd)}
.sub-section h4{font-size:.8rem;color:var(--ac);margin-bottom:.5rem;font-weight:600}

/* CONFIDENCE BADGES */
.conf{font-size:.65rem;padding:1px 6px;border-radius:4px;font-weight:500}
.conf.High{background:rgba(34,197,94,.15);color:var(--gn)}
.conf.Medium{background:rgba(249,115,22,.15);color:var(--or)}
.conf.Low{background:rgba(239,68,68,.15);color:var(--rd)}

/* STAFF TABLE */
.staff-group{margin-bottom:1rem}
.staff-group h4{font-size:.8rem;color:var(--ac);margin-bottom:.4rem;font-weight:600}
.staff-group .group-meta{font-size:.75rem;color:var(--dm);margin-bottom:.4rem}

/* SEARCH */
.search-box{width:100%;padding:.5rem .75rem;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:.85rem;margin-bottom:.75rem;outline:none}
.search-box:focus{border-color:var(--ac)}
.search-box::placeholder{color:var(--dm)}

/* SUMMARY ROW */
.summary-row{display:flex;justify-content:space-between;padding:.5rem;background:var(--s2);border-radius:6px;margin-top:.5rem;font-size:.8rem;font-weight:600}
.summary-row .label{color:var(--dm)}

/* GAPS */
.gap-item{display:flex;justify-content:space-between;padding:.4rem .75rem;font-size:.85rem;border-bottom:1px solid rgba(42,42,58,.5)}
.gap-item:last-child{border-bottom:none}
.gap-item .gap-name{color:var(--rd)}
.gap-item .gap-val{font-weight:600}

/* DATE GROUP */
.date-group-header{padding:.4rem .5rem;background:var(--s2);font-size:.75rem;color:var(--ac);font-weight:600;border-radius:4px;margin-top:.5rem}
.date-group-header:first-child{margin-top:0}

/* Scrollable tables */
.table-wrap{max-height:500px;overflow-y:auto;border:1px solid var(--bd);border-radius:8px}
.table-wrap::-webkit-scrollbar{width:6px}
.table-wrap::-webkit-scrollbar-track{background:var(--s1)}
.table-wrap::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}

/* Download buttons */
.dl-bar{display:flex;gap:6px;flex-wrap:wrap;margin:.5rem 0}
.dl-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--bd);background:var(--s2);color:var(--dm);font-size:.7rem;cursor:pointer;font-weight:600;transition:.15s}
.dl-btn:hover{border-color:var(--ac);color:var(--ac)}
.dl-btn:active{background:var(--ac);color:var(--bg)}
.dl-bar .dl-label{font-size:.7rem;color:var(--dm);align-self:center;margin-right:4px}
</style>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>

<script>
/* ========== PIN GATE ========== */
var VALID_PINS = ['2049','1234','0000','8008'];
var pinEntry = '';

function pinPress(k) {
  if (k === 'C') { pinEntry = ''; updateDots(); document.getElementById('pin-error').textContent = ''; return; }
  if (k === 'OK') {
    if (VALID_PINS.indexOf(pinEntry) !== -1) {
      document.getElementById('pin-gate').classList.add('hidden');
      document.getElementById('app').classList.add('show');
      renderAll();
    } else {
      document.getElementById('pin-error').textContent = 'Invalid PIN';
      pinEntry = '';
      updateDots();
    }
    return;
  }
  if (pinEntry.length < 4) { pinEntry += k; updateDots(); }
  if (pinEntry.length === 4) {
    setTimeout(function() {
      if (VALID_PINS.indexOf(pinEntry) !== -1) {
        document.getElementById('pin-gate').classList.add('hidden');
        document.getElementById('app').classList.add('show');
        renderAll();
      } else {
        document.getElementById('pin-error').textContent = 'Invalid PIN';
        pinEntry = '';
        updateDots();
      }
    }, 200);
  }
}

function updateDots() {
  var dots = document.querySelectorAll('.pin-dot');
  for (var i = 0; i < dots.length; i++) {
    dots[i].classList.toggle('filled', i < pinEntry.length);
  }
}

/* ========== HELPERS ========== */
function fmt(n) {
  if (n == null) return '-';
  var neg = n < 0;
  n = Math.abs(n);
  var s = n.toFixed(n % 1 === 0 ? 0 : 2);
  var parts = s.split('.');
  var int = parts[0];
  var dec = parts[1] ? '.' + parts[1] : '';
  // Indian grouping: last 3, then groups of 2
  if (int.length > 3) {
    var last3 = int.slice(-3);
    var rest = int.slice(0, -3);
    var grouped = '';
    while (rest.length > 2) {
      grouped = ',' + rest.slice(-2) + grouped;
      rest = rest.slice(0, -2);
    }
    grouped = rest + grouped;
    int = grouped + ',' + last3;
  }
  return (neg ? '-' : '') + int + dec;
}

function fmtDate(d) {
  if (!d) return '-';
  var parts = d.split('-');
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return parseInt(parts[2]) + ' ' + months[parseInt(parts[1])-1];
}

function toggleSection(el) {
  el.classList.toggle('open');
  var body = el.nextElementSibling;
  body.classList.toggle('open');
}

function toggleCat(idx) {
  var row = document.getElementById('cat-row-' + idx);
  var detail = document.getElementById('cat-detail-' + idx);
  row.classList.toggle('open');
  detail.classList.toggle('open');
}

/* ========== RENDER ========== */
function renderAll() {
  if (typeof DATA === 'undefined') return;

  // Period
  document.getElementById('period-sub').textContent =
    fmtDate(DATA.period.from) + ' -- ' + fmtDate(DATA.period.to) + ', 2026  |  ' + DATA.period.days + ' Days';

  // Bucket cards
  var buckets = {capex:0,fixed:0,variable:0,non_expense:0};
  var bucketCounts = {capex:0,fixed:0,variable:0,non_expense:0};
  var catKeys = Object.keys(DATA.categories);
  for (var i=0;i<catKeys.length;i++) {
    var c = DATA.categories[catKeys[i]];
    buckets[c.bucket] = (buckets[c.bucket]||0) + c.total;
    bucketCounts[c.bucket] = (bucketCounts[c.bucket]||0) + c.count;
  }
  var grand = buckets.capex + buckets.fixed + buckets.variable + buckets.non_expense;

  document.getElementById('bucket-cards').innerHTML =
    '<div class="bucket-card"><div class="label">CapEx (One-Time)</div><div class="val capex">' + fmt(buckets.capex) + '</div><div class="count">' + bucketCounts.capex + ' entries</div></div>' +
    '<div class="bucket-card"><div class="label">Fixed (Recurring)</div><div class="val fixed">' + fmt(buckets.fixed) + '</div><div class="count">' + bucketCounts.fixed + ' entries</div></div>' +
    '<div class="bucket-card"><div class="label">Variable (Sales-Linked)</div><div class="val variable">' + fmt(buckets.variable) + '</div><div class="count">' + bucketCounts.variable + ' entries</div></div>';

  document.getElementById('grand-total').innerHTML =
    '<div class="label">Grand Total (57 Days)</div><div class="val">' + fmt(grand) + '</div>';

  // Categories sorted by total desc
  var sorted = catKeys.slice().sort(function(a,b){ return DATA.categories[b].total - DATA.categories[a].total; });
  var catHtml = '';
  for (var i=0;i<sorted.length;i++) {
    var k = sorted[i];
    var c = DATA.categories[k];
    catHtml += '<div class="cat-row" id="cat-row-' + i + '" onclick="toggleCat(' + i + ')">' +
      '<span class="cat-dot ' + c.bucket + '"></span>' +
      '<span class="cat-name">' + k + '</span>' +
      '<span class="cat-count">' + c.count + '</span>' +
      '<span class="cat-total">' + fmt(c.total) + '</span>' +
      '<span class="cat-arrow">&#9654;</span>' +
      '</div>' +
      '<div class="cat-detail" id="cat-detail-' + i + '">' + renderCatDetail(k, c) + '</div>';
  }
  document.getElementById('cat-list').innerHTML = catHtml;

  // Staff
  renderStaff();

  // Shariff
  renderShariff();

  // MN Broilers
  renderMN();

  // Odoo
  renderOdoo();

  // Gaps
  renderGaps();
}

function renderCatDetail(name, cat) {
  var safeName = name.replace(/[^a-zA-Z0-9]/g,'_');
  var html = '<div class="dl-bar"><span class="dl-label">Export:</span><button class="dl-btn" onclick="dlCategoryCSV(\''+name.replace(/'/g,"\\'")+'\')">CSV</button><button class="dl-btn" onclick="dlCategoryXLSX(\''+name.replace(/'/g,"\\'")+'\')">XLSX</button></div>';
  html += '<table class="detail-table"><thead><tr><th>Date</th><th>Item</th><th class="amt">Amount</th></tr></thead><tbody>';
  var items = cat.items.slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });
  for (var i=0;i<items.length;i++) {
    var it = items[i];
    html += '<tr><td class="date">' + fmtDate(it.date) + '</td><td>' + it.name +
      (it.narration ? '<br><span class="narr">' + it.narration + '</span>' : '') +
      '</td><td class="amt">' + fmt(it.amount) + '</td></tr>';
  }
  html += '</tbody></table>';

  // Special: RM - Chicken -> show MN Broilers
  if (name === 'RM \u2014 Chicken') {
    html += '<div class="sub-section"><h4>M.N. Broilers -- Precise Daily Data (March)</h4>';
    html += '<table class="detail-table"><thead><tr><th>Date</th><th class="amt">Weight (kg)</th><th class="amt">Rate/kg</th><th class="amt">Amount</th></tr></thead><tbody>';
    var mn = DATA.mn_broilers;
    var totalKg = 0, totalAmt = 0;
    for (var i=0;i<mn.length;i++) {
      html += '<tr><td class="date">' + fmtDate(mn[i].date) + '</td><td class="amt">' + mn[i].kg + '</td><td class="amt">' + fmt(mn[i].rate) + '</td><td class="amt">' + fmt(mn[i].amount) + '</td></tr>';
      totalKg += mn[i].kg;
      totalAmt += mn[i].amount;
    }
    html += '</tbody></table>';
    html += '<div class="summary-row"><span class="label">Total: ' + totalKg.toFixed(1) + ' kg | Avg Rate: ' + fmt(Math.round(totalAmt/totalKg)) + '/kg</span><span>' + fmt(totalAmt) + '</span></div>';
    html += '<div style="margin-top:.5rem;font-size:.75rem;color:var(--dm)">Payments: 3 x 50,000 = 1,50,000 | Closing Balance: 83,905</div>';
    html += '</div>';
  }

  // Special: RM - Shariff Store -> show items
  if (name === 'RM \u2014 Shariff Store') {
    html += '<div class="sub-section"><h4>Shariff Purchase Book -- All 473 Items</h4>';
    html += '<div style="max-height:400px;overflow-y:auto">';
    html += '<table class="detail-table"><thead><tr><th>Date</th><th>Item</th><th class="amt">Qty</th><th>Unit</th><th class="amt">Price</th><th>Category</th><th>Conf</th></tr></thead><tbody>';
    var si = DATA.shariff_items.slice().sort(function(a,b){ return a.date < b.date ? -1 : 1; });
    for (var i=0;i<si.length;i++) {
      var s = si[i];
      html += '<tr><td class="date">' + fmtDate(s.date) + '</td><td>' + s.item + '</td><td class="amt">' + (s.qty||'-') + '</td><td>' + (s.unit||'-') + '</td><td class="amt">' + fmt(s.price) + '</td><td style="font-size:.7rem">' + s.category + '</td><td><span class="conf ' + s.confidence + '">' + s.confidence + '</span></td></tr>';
    }
    html += '</tbody></table></div></div>';
  }

  // Special: Salary -> group by person
  if (name === 'Salary') {
    html += '<div class="sub-section"><h4>Salary by Person</h4>';
    var byPerson = {};
    for (var i=0;i<cat.items.length;i++) {
      var it = cat.items[i];
      var pName = it.name.replace('Salary Expenses - ','').replace('Salary - ','').replace('January Salary - ','').replace('February Salary - ','').replace('March Salary - ','');
      if (!byPerson[pName]) byPerson[pName] = {total:0, entries:[]};
      byPerson[pName].total += it.amount;
      byPerson[pName].entries.push(it);
    }
    var personKeys = Object.keys(byPerson).sort(function(a,b){ return byPerson[b].total - byPerson[a].total; });
    html += '<table class="detail-table"><thead><tr><th>Person</th><th class="amt">Total Paid</th><th class="amt">Entries</th></tr></thead><tbody>';
    for (var i=0;i<personKeys.length;i++) {
      var pk = personKeys[i];
      html += '<tr><td>' + pk + '</td><td class="amt">' + fmt(byPerson[pk].total) + '</td><td class="amt">' + byPerson[pk].entries.length + '</td></tr>';
    }
    html += '</tbody></table></div>';
  }

  return html;
}

function renderShariff() {
  var html = '<div class="dl-bar"><span class="dl-label">Export:</span><button class="dl-btn" onclick="dlShariffCSV()">CSV</button><button class="dl-btn" onclick="dlShariffXLSX()">XLSX</button></div>';

  // Group by date
  var byDate = {};
  var dates = [];
  var si = DATA.shariff_items;
  for (var i=0;i<si.length;i++) {
    var d = si[i].date;
    if (!byDate[d]) { byDate[d] = []; dates.push(d); }
    byDate[d].push(si[i]);
  }
  dates.sort();

  html += '<div id="shariff-table-wrap" class="table-wrap" style="max-height:600px">';
  html += '<table class="detail-table" id="shariff-full-table"><thead><tr><th>Date</th><th>Item</th><th class="amt">Qty</th><th>Unit</th><th class="amt">Price</th><th>Category</th><th>Conf</th></tr></thead><tbody>';
  var grandTotal = 0;
  for (var d=0;d<dates.length;d++) {
    var dt = dates[d];
    var items = byDate[dt];
    var dayTotal = 0;
    for (var i=0;i<items.length;i++) dayTotal += items[i].price;
    grandTotal += dayTotal;
    html += '<tr class="shariff-row date-header"><td colspan="4" style="color:var(--ac);font-weight:600;padding-top:.6rem">' + fmtDate(dt) + ' (' + items.length + ' items)</td><td class="amt" style="color:var(--ac);font-weight:600;padding-top:.6rem" colspan="3">' + fmt(dayTotal) + '</td></tr>';
    for (var i=0;i<items.length;i++) {
      var s = items[i];
      html += '<tr class="shariff-row" data-search="' + (s.item + ' ' + s.category).toLowerCase() + '"><td class="date">' + fmtDate(s.date) + '</td><td>' + s.item + '</td><td class="amt">' + (s.qty||'-') + '</td><td>' + (s.unit||'-') + '</td><td class="amt">' + fmt(s.price) + '</td><td style="font-size:.7rem">' + s.category + '</td><td><span class="conf ' + s.confidence + '">' + s.confidence + '</span></td></tr>';
    }
  }
  html += '</tbody></table></div>';
  html += '<div class="summary-row"><span class="label">Total: ' + si.length + ' items across ' + dates.length + ' days</span><span>' + fmt(grandTotal) + '</span></div>';

  document.getElementById('shariff-section').innerHTML = html;

function filterShariff(q) {
  q = q.toLowerCase();
  var rows = document.querySelectorAll('.shariff-row');
  for (var i=0;i<rows.length;i++) {
    var row = rows[i];
    if (row.classList.contains('date-header')) {
      row.style.display = q === '' ? '' : 'none';
    } else {
      var text = row.getAttribute('data-search') || '';
      row.style.display = text.indexOf(q) !== -1 ? '' : 'none';
    }
  }
}

/* ========== DOWNLOAD FUNCTIONS ========== */
function toCSV(headers, rows) {
  var lines = [headers.join(',')];
  for (var i=0;i<rows.length;i++) {
    lines.push(rows[i].map(function(v) {
      v = String(v==null?'':v);
      if (v.indexOf(',')>=0||v.indexOf('"')>=0||v.indexOf('\n')>=0) return '"'+v.replace(/"/g,'""')+'"';
      return v;
    }).join(','));
  }
  return lines.join('\n');
}

function downloadCSV(name, headers, rows) {
  var csv = toCSV(headers, rows);
  var blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name+'.csv';
  a.click();
}

function downloadXLSX(name, headers, rows, sheetName) {
  var ws_data = [headers].concat(rows);
  var ws = XLSX.utils.aoa_to_sheet(ws_data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, sheetName||'Sheet1');
  XLSX.writeFile(wb, name+'.xlsx');
}

function downloadMultiXLSX(name, sheets) {
  var wb = XLSX.utils.book_new();
  for (var i=0;i<sheets.length;i++) {
    var ws = XLSX.utils.aoa_to_sheet([sheets[i].headers].concat(sheets[i].rows));
    XLSX.utils.book_append_sheet(wb, ws, sheets[i].name);
  }
  XLSX.writeFile(wb, name+'.xlsx');
}

function dlBar(csvFn, xlsxFn, allFn) {
  var h = '<div class="dl-bar"><span class="dl-label">Download:</span>';
  h += '<button class="dl-btn" onclick="'+csvFn+'">CSV</button>';
  h += '<button class="dl-btn" onclick="'+xlsxFn+'">XLSX</button>';
  if (allFn) h += '<button class="dl-btn" onclick="'+allFn+'">All Formats</button>';
  h += '</div>';
  return h;
}
