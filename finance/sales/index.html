<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HN Hotels — Sales Register</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--s1:#12121a;--s2:#1a1a28;--s3:#222236;--nch:#d4a44c;--he:#f97316;--tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;--bd:#1e2a40;--gn:#22c55e;--rd:#ef4444}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh}

/* PIN */
#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
.pin-box{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:32px 28px;width:320px;text-align:center}
.pin-logo{font-size:26px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--tx3);margin-bottom:24px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--s3);border:1px solid var(--bd);transition:background .15s}
.pin-dot.filled{border-color:var(--nch);background:var(--nch)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-btn{background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);cursor:pointer;font-size:18px;font-weight:600;padding:14px;transition:all .1s}
.pin-btn:hover{background:var(--s3);border-color:var(--nch)}
.pin-btn:active{transform:scale(.95)}
.pin-err{color:var(--rd);font-size:12px;min-height:16px;margin-top:10px}

/* App */
#app{display:none}
.hdr{background:var(--s1);border-bottom:1px solid var(--bd);padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-wrap:wrap}
.hdr-logo{font-weight:800;font-size:15px;letter-spacing:1px}
.hdr-title{font-size:13px;font-weight:600;color:var(--tx)}
.brand-tabs{display:flex;gap:4px;margin-left:auto}
.brand-tab{background:none;border:1px solid var(--bd);border-radius:8px;color:var(--tx3);cursor:pointer;font-size:12px;font-weight:600;padding:6px 14px;transition:all .15s}
.brand-tab.active-nch{background:rgba(212,164,76,.15);border-color:var(--nch);color:var(--nch)}
.brand-tab.active-he{background:rgba(249,115,22,.15);border-color:var(--he);color:var(--he)}
.brand-tab.active-both{background:rgba(99,102,241,.15);border-color:#6366f1;color:#6366f1}
.hdr-actions{display:flex;gap:6px}
.hdr-btn{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx3);cursor:pointer;font-size:11px;font-weight:600;padding:6px 12px;transition:all .15s}
.hdr-btn:hover{background:var(--s3);color:var(--tx);border-color:var(--nch)}

.wrap{max-width:1200px;margin:0 auto;padding:16px 20px}

/* Date controls */
.date-row{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.date-label{font-size:12px;color:var(--tx3);font-weight:600}
.date-inp{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx);font-size:12px;padding:6px 10px;outline:none}
.date-inp:focus{border-color:var(--nch)}
.preset-btn{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx3);cursor:pointer;font-size:11px;font-weight:600;padding:5px 10px;transition:all .1s}
.preset-btn:hover{background:var(--s3);color:var(--tx);border-color:var(--nch)}
.apply-btn{background:rgba(212,164,76,.15);border:1px solid var(--nch);border-radius:7px;color:var(--nch);cursor:pointer;font-size:12px;font-weight:700;padding:6px 14px;transition:all .15s}
.apply-btn:hover{background:rgba(212,164,76,.25)}
.sep{color:var(--bd);font-size:18px;line-height:1}

/* Summary cards */
.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-bottom:16px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:13px 15px}
.card-label{font-size:11px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.card-val{font-size:21px;font-weight:800;font-variant-numeric:tabular-nums}
.card-sub{font-size:11px;color:var(--tx3);margin-top:3px}

/* View tabs */
.view-tabs{display:flex;gap:6px;margin-bottom:14px;border-bottom:1px solid var(--bd);padding-bottom:10px}
.view-tab{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:13px;font-weight:600;padding:6px 14px;border-radius:8px;transition:all .15s}
.view-tab:hover{background:var(--s2)}
.view-tab.active{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}

/* Day table */
.day-table{width:100%;border-collapse:collapse}
.day-head th{background:var(--s1);color:var(--tx3);font-size:11px;font-weight:600;letter-spacing:.5px;padding:9px 12px;text-align:left;text-transform:uppercase;position:sticky;top:56px;z-index:10;border-bottom:1px solid var(--bd)}
.day-row{border-bottom:1px solid #12121a;cursor:pointer;transition:background .1s}
.day-row:hover{background:var(--s1)}
.day-row.expanded{background:var(--s1)}
.day-row td{padding:10px 12px;font-size:13px;color:var(--tx2);vertical-align:middle}
.day-row td.day-date{font-weight:700;color:var(--tx);font-size:13px}
.day-row td.day-rev{font-weight:700;font-variant-numeric:tabular-nums;font-size:14px}
.day-row td.num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace}
.day-tag{display:inline-block;border-radius:4px;font-size:9px;font-weight:700;padding:2px 6px;margin-left:6px;text-transform:uppercase;letter-spacing:.4px}
.tag-nch{background:rgba(212,164,76,.2);color:var(--nch)}
.tag-he{background:rgba(249,115,22,.2);color:var(--he)}
.expand-btn{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:5px}
.expand-btn:hover{background:var(--s3)}
.print-day-btn{background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:600;padding:3px 8px;transition:all .1s}
.print-day-btn:hover{border-color:var(--nch);color:var(--nch)}

/* Item detail row */
.detail-row{display:none;background:#0d0d18}
.detail-row.show{display:table-row}
.detail-cell{padding:0 0 0 0}
.item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1px;background:var(--s3)}
.item-cell{background:#0e0e1a;padding:9px 14px;display:flex;justify-content:space-between;align-items:center}
.item-name{font-size:12px;color:var(--tx2);flex:1}
.item-qty{font-size:11px;color:var(--tx3);font-variant-numeric:tabular-nums;margin:0 10px}
.item-amt{font-size:12px;font-weight:700;color:var(--tx);font-variant-numeric:tabular-nums;font-family:monospace}

/* Item summary view */
.item-summary-table{width:100%;border-collapse:collapse;font-size:13px}
.item-summary-table th{background:var(--s1);color:var(--tx3);font-size:11px;font-weight:600;letter-spacing:.5px;padding:9px 12px;text-align:left;text-transform:uppercase;position:sticky;top:56px;z-index:10;border-bottom:1px solid var(--bd)}
.item-summary-table td{border-bottom:1px solid #12121a;color:var(--tx2);padding:8px 12px;vertical-align:middle}
.item-summary-table tr:hover td{background:var(--s1)}
.item-summary-table .num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace}
.item-summary-table .bold{font-weight:700;color:var(--tx)}
.item-bar-bg{background:var(--s3);border-radius:3px;height:5px;width:100px;display:inline-block;vertical-align:middle;overflow:hidden}
.item-bar-fill{height:100%;border-radius:3px}
.tr-total td{background:var(--s2);font-weight:700;color:var(--tx);border-top:1px solid var(--bd)}

/* Trend view */
.trend-wrap{overflow-x:auto}
.trend-chart{display:flex;align-items:flex-end;gap:4px;height:180px;padding:10px 0}
.trend-bar-wrap{display:flex;flex-direction:column;align-items:center;flex:1;min-width:28px;max-width:60px}
.trend-bar{width:100%;border-radius:4px 4px 0 0;min-height:2px;cursor:pointer;transition:opacity .15s}
.trend-bar:hover{opacity:.75}
.trend-bar-label{font-size:9px;color:var(--tx3);margin-top:4px;white-space:nowrap;transform:rotate(-45deg);transform-origin:top left;height:36px}

/* Bottom actions */
.bottom-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;align-items:center}
.bottom-btn{background:var(--s1);border:1px solid var(--bd);border-radius:8px;color:var(--tx3);cursor:pointer;font-size:12px;font-weight:600;padding:10px 18px;transition:all .15s}
.bottom-btn:hover{border-color:var(--nch);color:var(--nch)}
.bottom-btn.primary{background:rgba(212,164,76,.12);border-color:rgba(212,164,76,.4);color:var(--nch)}

/* Print CSS */
@media print{
  body{background:#fff;color:#111;font-size:11px}
  .no-print{display:none!important}
  table{border-collapse:collapse;width:100%}
  th{background:#f5f0e8!important;color:#555!important;padding:6px 8px!important;text-align:left!important;border-bottom:2px solid #c8860a!important;font-size:10px}
  td{border-bottom:1px solid #eee!important;padding:5px 8px!important;color:#222!important}
}

@media(max-width:700px){.cards{grid-template-columns:1fr 1fr}.item-grid{grid-template-columns:1fr}}
</style>
</head>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-logo" style="background:linear-gradient(90deg,var(--nch),var(--he));-webkit-background-clip:text;-webkit-text-fill-color:transparent">HN Sales</div>
    <div class="pin-sub">NCH + Hamza Express · Sales Register</div>
    <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
    <div class="pin-pad" id="pin-pad"></div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <div class="hdr no-print">
    <div class="hdr-logo" style="background:linear-gradient(90deg,var(--nch),var(--he));-webkit-background-clip:text;-webkit-text-fill-color:transparent">ن HN</div>
    <div class="hdr-title">Sales Register</div>
    <div class="brand-tabs">
      <button class="brand-tab active-nch" id="tab-nch" onclick="setBrand('nch')">ن NCH</button>
      <button class="brand-tab" id="tab-he" onclick="setBrand('he')">🍚 HE</button>
      <button class="brand-tab" id="tab-both" onclick="setBrand('both')">Both</button>
    </div>
    <div class="hdr-actions">
      <button class="hdr-btn" onclick="printRange()">🖨 Print Range</button>
      <button class="hdr-btn" onclick="dlXLSX()">📊 XLSX</button>
    </div>
  </div>
  <div class="wrap">
    <!-- Date controls -->
    <div class="date-row no-print">
      <span class="date-label">From</span>
      <input class="date-inp" type="date" id="dt-from" value="2026-02-03">
      <span class="sep">→</span>
      <input class="date-inp" type="date" id="dt-to" value="2026-03-31">
      <button class="apply-btn" onclick="apply()">Apply</button>
      <span class="sep" style="margin-left:6px">|</span>
      <button class="preset-btn" onclick="setPreset('naveen')">Naveen Period (Feb 3 – Mar 31)</button>
      <button class="preset-btn" onclick="setPreset('nch-launch')">NCH Launch (Feb 3 – Feb 28)</button>
      <button class="preset-btn" onclick="setPreset('he-launch')">HE Launch (Feb 27 – Mar 31)</button>
      <button class="preset-btn" onclick="setPreset('all')">All Data</button>
    </div>
    <!-- Summary -->
    <div class="cards" id="summary-cards"></div>
    <!-- View tabs -->
    <div class="view-tabs no-print">
      <button class="view-tab active" id="vtab-day" onclick="setView('day')">📅 By Day</button>
      <button class="view-tab" id="vtab-item" onclick="setView('item')">📦 By Item</button>
      <button class="view-tab" id="vtab-trend" onclick="setView('trend')">📊 Trend</button>
    </div>
    <!-- Views -->
    <div id="view-day"></div>
    <div id="view-item" style="display:none"></div>
    <div id="view-trend" style="display:none"></div>
    <!-- Bottom -->
    <div class="bottom-row no-print">
      <button class="bottom-btn primary" onclick="printRange()">🖨 Print Selected Range as PDF</button>
      <button class="bottom-btn" onclick="dlXLSX()">📊 Download XLSX</button>
      <span id="range-summary" style="font-size:12px;color:var(--tx3);margin-left:auto"></span>
    </div>
  </div>
</div>

<script>
var PINS=['0305','2026','3678'],pinVal='';
(function(){
  var pad=document.getElementById('pin-pad');
  [1,2,3,4,5,6,7,8,9,'','0','⌫'].forEach(function(k){
    var b=document.createElement('button'); b.className='pin-btn'; b.textContent=k;
    if(k===''){b.style.visibility='hidden';}
    else{b.addEventListener('click',function(){
      if(k==='⌫'){pinVal=pinVal.slice(0,-1);}
      else if(pinVal.length<4){pinVal+=k;}
      upD(); if(pinVal.length===4)chkP();
    });}
    pad.appendChild(b);
  });
})();
function upD(){for(var i=0;i<4;i++)document.getElementById('d'+i).className='pin-dot'+(i<pinVal.length?' filled':'');document.getElementById('pin-err').textContent='';}
function chkP(){
  if(PINS.indexOf(pinVal)>=0){document.getElementById('pin-screen').style.display='none';document.getElementById('app').style.display='block';init();}
  else{document.getElementById('pin-err').textContent='Incorrect PIN';pinVal='';upD();}
}

// ─── STATE ───────────────────────────────────────────────────────────────────
var brand='nch', view='day', dateFrom='2026-02-03', dateTo='2026-03-31';

function init(){apply();}

function setBrand(b){
  brand=b;
  ['nch','he','both'].forEach(function(x){
    var el=document.getElementById('tab-'+x);
    el.className='brand-tab'+(b===x?' active-'+b:'');
  });
  // adjust date from for HE
  if(b==='he' && dateFrom<'2026-02-27') document.getElementById('dt-from').value='2026-02-27';
  if(b==='nch') document.getElementById('dt-from').value='2026-02-03';
  apply();
}

function setPreset(p){
  if(p==='naveen'){dateFrom='2026-02-03';dateTo='2026-03-31';}
  else if(p==='nch-launch'){dateFrom='2026-02-03';dateTo='2026-02-28';}
  else if(p==='he-launch'){dateFrom='2026-02-27';dateTo='2026-03-31';}
  else if(p==='all'){
    dateFrom=(brand==='he'?'2026-02-27':'2026-02-03');
    dateTo='2026-04-16';
  }
  document.getElementById('dt-from').value=dateFrom;
  document.getElementById('dt-to').value=dateTo;
  apply();
}

function setView(v){
  view=v;
  ['day','item','trend'].forEach(function(x){
    document.getElementById('vtab-'+x).className='view-tab'+(v===x?' active':'');
    document.getElementById('view-'+x).style.display=(v===x?'block':'none');
  });
}

function apply(){
  dateFrom=document.getElementById('dt-from').value;
  dateTo=document.getElementById('dt-to').value;
  var rows=getRows();
  renderCards(rows);
  renderDay(rows);
  renderItem(rows);
  renderTrend(rows);
  document.getElementById('range-summary').textContent=rows.length+' days shown';
}

function getRows(){
  var sets=[];
  if(brand==='nch'||brand==='both') sets.push({data:RAW.nch,tag:'nch'});
  if(brand==='he'||brand==='both') sets.push({data:RAW.he,tag:'he'});
  var combined={};
  sets.forEach(function(s){
    s.data.forEach(function(row){
      if(row.d<dateFrom||row.d>dateTo) return;
      if(!combined[row.d]) combined[row.d]={d:row.d,n:0,g:0,items:{},tags:[]};
      combined[row.d].n+=row.n;
      combined[row.d].g+=row.g;
      combined[row.d].tags.push(s.tag);
      Object.keys(row.items).forEach(function(k){
        var v=row.items[k];
        if(!combined[row.d].items[k]) combined[row.d].items[k]={q:0,a:0,tag:s.tag};
        combined[row.d].items[k].q+=v.q;
        combined[row.d].items[k].a+=v.a;
      });
    });
  });
  return Object.values(combined).sort(function(a,b){return a.d>b.d?1:-1;});
}

function cleanName(n){
  return n.replace(/^\[(?:NCH|HE)-[^\]]+\]\s*/,'').replace(/^\[HN-RM-\d+\]\s*/,'');
}

function fmtDate(d){
  var dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-IN',{weekday:'short',day:'2-digit',month:'short'});
}

function f(n){return '\u20b9'+Number(n).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:0});}

// ─── CARDS ───────────────────────────────────────────────────────────────────
function renderCards(rows){
  var tot=rows.reduce(function(s,r){return s+r.g;},0);
  var ord=rows.reduce(function(s,r){return s+r.n;},0);
  var days=rows.length;
  var avgDay=days?tot/days:0;
  var avgTkt=ord?tot/ord:0;
  var clr=(brand==='nch'?'var(--nch)':(brand==='he'?'var(--he)':'#6366f1'));
  document.getElementById('summary-cards').innerHTML=
    card('Total Revenue',f(tot),'',clr)+
    card('Orders',ord.toLocaleString('en-IN'),'',clr)+
    card('Days',days,'in range',clr)+
    card('Avg / Day',f(avgDay),'daily revenue',clr)+
    card('Avg Ticket',f(avgTkt),'per order',clr);
}
function card(l,v,s,c){return '<div class="card"><div class="card-label">'+l+'</div><div class="card-val" style="color:'+c+'">'+v+'</div><div class="card-sub">'+s+'</div></div>';}

// ─── BY DAY ──────────────────────────────────────────────────────────────────
function renderDay(rows){
  var clr=(brand==='nch'?'var(--nch)':(brand==='he'?'var(--he)':'#6366f1'));
  var maxG=rows.reduce(function(m,r){return Math.max(m,r.g);},0);
  var h='<table class="day-table"><thead class="day-head"><tr>'
    +'<th>Date</th><th>Day</th><th style="text-align:right">Revenue</th>'
    +'<th style="text-align:right">Orders</th><th style="text-align:right">Avg Ticket</th>'
    +'<th style="text-align:right">Contribution</th><th style="text-align:center">Actions</th></tr></thead><tbody>';
  rows.forEach(function(row,i){
    var avg=row.n?row.g/row.n:0;
    var pct=(maxG?row.g/maxG*100:0).toFixed(0);
    var barW=(maxG?row.g/maxG*80:0).toFixed(0);
    var tagHtml=brand==='both'?row.tags.map(function(t){return '<span class="day-tag tag-'+t+'">'+t.toUpperCase()+'</span>';}).join(''):'';
    h+='<tr class="day-row" id="dr-'+i+'" onclick="toggleDetail('+i+')">'
      +'<td class="day-date">'+fmtDate(row.d)+tagHtml+'</td>'
      +'<td style="color:var(--tx3);font-size:12px">'+row.d+'</td>'
      +'<td class="day-rev num" style="color:'+clr+'">'+f(row.g)+'</td>'
      +'<td class="num">'+row.n+'</td>'
      +'<td class="num">'+f(avg)+'</td>'
      +'<td class="num"><div style="display:inline-flex;align-items:center;gap:6px">'
      +'<div class="item-bar-bg" style="width:80px"><div class="item-bar-fill" style="width:'+barW+'%;background:'+clr+'"></div></div>'
      +'<span style="font-size:11px;color:var(--tx3)">'+pct+'%</span></div></td>'
      +'<td style="text-align:center;white-space:nowrap">'
      +'<button class="print-day-btn" onclick="event.stopPropagation();printDay('+i+','+JSON.stringify(row.d)+')">🖨 PDF</button>'
      +'<span style="color:var(--tx3);font-size:16px;margin-left:6px" id="chv-'+i+'">▾</span>'
      +'</td></tr>';
    // Detail row
    h+='<tr class="detail-row" id="dd-'+i+'"><td colspan="7" class="detail-cell">';
    var items=Object.entries(row.items).sort(function(a,b){return b[1].a-a[1].a;});
    h+='<div class="item-grid">';
    items.forEach(function(iv){
      var itemClr=iv[1].tag==='he'?'var(--he)':(iv[1].tag==='nch'?'var(--nch)':'var(--tx)');
      h+='<div class="item-cell"><span class="item-name">'+cleanName(iv[0])+'</span>'
        +'<span class="item-qty">×'+iv[1].q+'</span>'
        +'<span class="item-amt" style="color:'+itemClr+'">'+f(iv[1].a)+'</span></div>';
    });
    h+='</div></td></tr>';
  });
  h+='</tbody></table>';
  document.getElementById('view-day').innerHTML=h;
  document.getElementById('view-day').style.display=(view==='day'?'block':'none');
}

function toggleDetail(i){
  var dd=document.getElementById('dd-'+i);
  var chv=document.getElementById('chv-'+i);
  var show=dd.classList.toggle('show');
  chv.textContent=show?'▴':'▾';
  document.getElementById('dr-'+i).classList.toggle('expanded',show);
}

// ─── BY ITEM ─────────────────────────────────────────────────────────────────
function renderItem(rows){
  var totals={};
  var grandAmt=0;
  rows.forEach(function(row){
    Object.entries(row.items).forEach(function(iv){
      if(!totals[iv[0]]) totals[iv[0]]={q:0,a:0,tag:iv[1].tag};
      totals[iv[0]].q+=iv[1].q;
      totals[iv[0]].a+=iv[1].a;
      grandAmt+=iv[1].a;
    });
  });
  var sorted=Object.entries(totals).sort(function(a,b){return b[1].a-a[1].a;});
  var maxA=sorted.length?sorted[0][1].a:1;
  var clr=(brand==='nch'?'var(--nch)':(brand==='he'?'var(--he)':'#6366f1'));
  var h='<table class="item-summary-table"><thead><tr><th>#</th><th>Product</th><th style="text-align:right">Total Qty</th><th style="text-align:right">Revenue</th><th style="text-align:right">% Share</th><th>Bar</th></tr></thead><tbody>';
  sorted.forEach(function(iv,i){
    var pct=(grandAmt?iv[1].a/grandAmt*100:0).toFixed(1);
    var barW=(maxA?iv[1].a/maxA*100:0).toFixed(0);
    var itemClr=iv[1].tag==='he'?'var(--he)':(iv[1].tag==='nch'?'var(--nch)':clr);
    h+='<tr><td style="color:var(--tx3);font-size:12px">'+(i+1)+'</td>'
      +'<td class="bold">'+cleanName(iv[0])+'</td>'
      +'<td class="num">'+iv[1].q.toFixed(1)+'</td>'
      +'<td class="num" style="color:'+itemClr+'">'+f(iv[1].a)+'</td>'
      +'<td class="num" style="color:var(--tx3)">'+pct+'%</td>'
      +'<td><div class="item-bar-bg" style="width:120px"><div class="item-bar-fill" style="width:'+barW+'%;background:'+itemClr+'"></div></div></td></tr>';
  });
  h+='<tr class="tr-total"><td colspan="2">Total</td><td class="num">—</td><td class="num">'+f(grandAmt)+'</td><td class="num">100%</td><td></td></tr>';
  h+='</tbody></table>';
  document.getElementById('view-item').innerHTML=h;
  document.getElementById('view-item').style.display=(view==='item'?'block':'none');
}

// ─── TREND ───────────────────────────────────────────────────────────────────
function renderTrend(rows){
  var maxG=rows.reduce(function(m,r){return Math.max(m,r.g);},0);
  var clr=(brand==='nch'?'var(--nch)':(brand==='he'?'var(--he)':'#6366f1'));
  var h='<div class="trend-wrap"><div class="trend-chart">';
  rows.forEach(function(row,i){
    var h2=maxG?Math.max(4,row.g/maxG*160):4;
    var lbl=row.d.slice(5); // MM-DD
    h+='<div class="trend-bar-wrap" title="'+row.d+': '+f(row.g)+'">'
      +'<div class="trend-bar" style="height:'+h2+'px;background:'+clr+'" onclick="setView('day')"></div>'
      +'<div class="trend-bar-label">'+lbl+'</div></div>';
  });
  h+='</div></div>';
  document.getElementById('view-trend').innerHTML=h;
  document.getElementById('view-trend').style.display=(view==='trend'?'block':'none');
}

function printDay(i, dateStr){
  var rows=getRows();
  var row=rows.find(function(r){return r.d===dateStr;});
  if(!row) return;
  var avg=row.n?row.g/row.n:0;
  var items=Object.entries(row.items).sort(function(a,b){return b[1].a-a[1].a;});
  var tbl='<table><thead><tr><th>#</th><th>Product</th><th class="num">Qty Sold</th><th class="num">Revenue (₹)</th></tr></thead><tbody>';
  var tot=0;
  items.forEach(function(iv,n){
    tbl+='<tr><td>'+(n+1)+'</td><td>'+cleanName(iv[0])+'</td><td class="num">'+iv[1].q.toFixed(1)+'</td><td class="num">'+Number(iv[1].a).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td></tr>';
    tot+=iv[1].a;
  });
  tbl+='<tr class="tr-total"><td colspan="2">Total</td><td class="num">—</td><td class="num">'+Number(tot).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td></tr></tbody></table>';
  var brandName=brand==='nch'?'Nawabi Chai House':(brand==='he'?'Hamza Express':'HN Hotels');

    '<h1>'+brandName+'</h1><h2>Daily Sales — '+fmtDate(dateStr)+' ('+dateStr+')</h2>'
    +'<div class="meta">POS Sales · Source: Odoo 19 · Generated '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+'</div>'
    +'<div class="stats">'
    +'<div class="stat-box"><div class="stat-label">Revenue</div><div class="stat-val">₹'+Number(row.g).toLocaleString('en-IN',{maximumFractionDigits:0})+'</div></div>'
    +'<div class="stat-box"><div class="stat-label">Orders</div><div class="stat-val">'+row.n+'</div></div>'
    +'<div class="stat-box"><div class="stat-label">Avg Ticket</div><div class="stat-val">₹'+Number(avg).toLocaleString('en-IN',{maximumFractionDigits:0})+'</div></div>'
    +'</div>'+tbl);
}

function printRange(){

    +'<h2>'+dateFrom+' to '+dateTo+'</h2>'
    +'<div class="meta">'+rows.length+' days · '+grandOrd.toLocaleString()+" orders · ₹"+Number(grandTot).toLocaleString('en-IN',{maximumFractionDigits:0})+' total · Generated '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+'</div>'
    +'<table><thead><tr><th>Date</th><th>Day</th><th class="num">Orders</th><th class="num">Revenue (₹)</th><th class="num">Avg Ticket (₹)</th></tr></thead><tbody>';
  var running=0;
  rows.forEach(function(row){
    running+=row.g;
    body+='<tr><td>'+row.d+'</td><td>'+fmtDate(row.d).split(',')[0]+'</td>'
      +'<td class="num">'+row.n+'</td>'
      +'<td class="num">'+Number(row.g).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td>'
      +'<td class="num">'+Number(row.n?row.g/row.n:0).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td></tr>';
  });
  body+='<tr class="tr-total"><td colspan="2">TOTAL</td><td class="num">'+grandOrd+'</td><td class="num">₹'+Number(grandTot).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td><td class="num">₹'+Number(grandOrd?grandTot/grandOrd:0).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td></tr>'
    +'</tbody></table>';
  // Item summary
  var itemTotals={};
  rows.forEach(function(row){Object.entries(row.items).forEach(function(iv){
    if(!itemTotals[iv[0]]) itemTotals[iv[0]]={q:0,a:0};
    itemTotals[iv[0]].q+=iv[1].q; itemTotals[iv[0]].a+=iv[1].a;
  });});
  var sortedI=Object.entries(itemTotals).sort(function(a,b){return b[1].a-a[1].a;});
  body+='<h2 style="margin:20px 0 8px;font-size:13px;font-weight:700;border-bottom:1px solid #c8860a;padding-bottom:4px">Item Summary</h2>'
    +'<table><thead><tr><th>#</th><th>Product</th><th class="num">Total Qty</th><th class="num">Revenue (₹)</th><th class="num">% Share</th></tr></thead><tbody>';
  sortedI.forEach(function(iv,n){
    var pct=(grandTot?iv[1].a/grandTot*100:0).toFixed(1);
    body+='<tr><td>'+(n+1)+'</td><td>'+cleanName(iv[0])+'</td><td class="num">'+iv[1].q.toFixed(1)+'</td><td class="num">'+Number(iv[1].a).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td><td class="num">'+pct+'%</td></tr>';
  });
  body+='<tr class="tr-total"><td colspan="2">Total</td><td class="num">—</td><td class="num">₹'+Number(grandTot).toLocaleString('en-IN',{maximumFractionDigits:0})+'</td><td class="num">100%</td></tr></tbody></table>';
  openPrint(brandName+' Sales '+dateFrom+' to '+dateTo, body);
}

// ─── XLSX ─────────────────────────────────────────────────────────────────────
function dlXLSX(){
  if(typeof XLSX==='undefined'){alert('Excel library not loaded.');return;}
  var rows=getRows();
  var brandName=brand==='nch'?'Nawabi Chai House':(brand==='he'?'Hamza Express':'HN Hotels');
  var wb=XLSX.utils.book_new();
  // Daily totals sheet
  var aoa=[['HN Hotels — Sales Register'],['Brand: '+brandName],['Period: '+dateFrom+' to '+dateTo],[]];
  aoa.push(['Date','Day Name','Orders','Revenue (₹)','Avg Ticket (₹)']);
  rows.forEach(function(row){
    aoa.push([row.d, fmtDate(row.d), row.n, Math.round(row.g), Math.round(row.n?row.g/row.n:0)]);
  });
  var grandTot=rows.reduce(function(s,r){return s+r.g;},0);
  var grandOrd=rows.reduce(function(s,r){return s+r.n;},0);
  aoa.push(['TOTAL','',grandOrd,Math.round(grandTot),Math.round(grandOrd?grandTot/grandOrd:0)]);
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  ws['!cols']=[{wch:14},{wch:16},{wch:10},{wch:16},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws,'Daily Totals');
  // Item totals sheet
  var itemTotals={};
  rows.forEach(function(row){Object.entries(row.items).forEach(function(iv){
    if(!itemTotals[iv[0]]) itemTotals[iv[0]]={q:0,a:0};
    itemTotals[iv[0]].q+=iv[1].q; itemTotals[iv[0]].a+=iv[1].a;
  });});
  var sortedI=Object.entries(itemTotals).sort(function(a,b){return b[1].a-a[1].a;});
  var aoa2=[['Item Name','Total Qty','Revenue (₹)','% Share']];
  sortedI.forEach(function(iv){
    var pct=(grandTot?iv[1].a/grandTot*100:0).toFixed(1);
    aoa2.push([cleanName(iv[0]),iv[1].q.toFixed(1),Math.round(iv[1].a),pct+'%']);
  });
  var ws2=XLSX.utils.aoa_to_sheet(aoa2);
  ws2['!cols']=[{wch:38},{wch:12},{wch:16},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws2,'Item Totals');
  // Per-day item sheet
  var aoa3=[['Date','Product','Qty','Revenue (₹)']];
  rows.forEach(function(row){
    var items=Object.entries(row.items).sort(function(a,b){return b[1].a-a[1].a;});
    items.forEach(function(iv){aoa3.push([row.d,cleanName(iv[0]),iv[1].q.toFixed(1),Math.round(iv[1].a)]);});
  });
  var ws3=XLSX.utils.aoa_to_sheet(aoa3);
  ws3['!cols']=[{wch:14},{wch:38},{wch:10},{wch:16}];
  XLSX.utils.book_append_sheet(wb,ws3,'Day x Item Detail');
  XLSX.writeFile(wb,'HN_Sales_'+brand+'_'+dateFrom+'_'+dateTo+'.xlsx');
}

function openPrint(title,body){
  var w=window.open('','_blank','width=960,height=800');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>'+PSTYLE+'</style></head><body>'+body+'<div class="footer">HN Hotels Pvt Ltd &nbsp;·&nbsp; Confidential &nbsp;·&nbsp; Generated '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+'</div></body></html>');
  w.document.close();
  setTimeout(function(){w.print();},600);
}
