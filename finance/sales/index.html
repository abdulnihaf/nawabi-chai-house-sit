<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HN Hotels — Sales Register</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--s1:#12121a;--s2:#1a1a28;--s3:#222236;
  --nch:#d4a44c;--he:#f97316;--tx:#e2e8f0;--tx2:#94a3b8;--tx3:#64748b;
  --bd:#1e2a40;--gn:#22c55e;--rd:#ef4444;
  --hdr:56px;--sum:72px;
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;min-height:100vh}

/* ── PIN ────────────────────────────────────────────── */
#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column}
.pin-box{background:var(--s1);border:1px solid var(--bd);border-radius:16px;padding:32px 28px;width:320px;text-align:center}
.pin-logo{font-size:24px;font-weight:800;letter-spacing:2px;margin-bottom:4px}
.pin-sub{font-size:12px;color:var(--tx3);margin-bottom:24px}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:12px;height:12px;border-radius:50%;background:var(--s3);border:1px solid var(--bd);transition:background .15s}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.pin-btn{background:var(--s2);border:1px solid var(--bd);border-radius:10px;color:var(--tx);cursor:pointer;font-size:18px;font-weight:600;padding:14px;transition:all .1s}
.pin-btn:hover{background:var(--s3)}
.pin-btn:active{transform:scale(.95)}
.pin-err{color:var(--rd);font-size:12px;min-height:16px;margin-top:10px}

/* ── APP SHELL ──────────────────────────────────────── */
#app{display:none}

/* Header */
.hdr{
  height:var(--hdr);background:var(--s1);border-bottom:1px solid var(--bd);
  padding:0 18px;display:flex;align-items:center;gap:10px;
  position:fixed;top:0;left:0;right:0;z-index:200;
}
.hdr-logo{font-weight:800;font-size:14px;letter-spacing:1px;flex-shrink:0}
.brand-tabs{display:flex;gap:4px;margin-left:8px}
.btab{background:none;border:1px solid var(--bd);border-radius:8px;color:var(--tx3);cursor:pointer;font-size:11px;font-weight:700;padding:5px 13px;transition:all .15s;letter-spacing:.3px}
.btab.on-nch{background:rgba(212,164,76,.15);border-color:var(--nch);color:var(--nch)}
.btab.on-he{background:rgba(249,115,22,.15);border-color:var(--he);color:var(--he)}
.date-row{display:flex;align-items:center;gap:6px;margin-left:auto}
.dt-lbl{font-size:11px;color:var(--tx3)}
.dt-inp{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-size:11px;padding:4px 8px;outline:none;width:110px}
.dt-inp:focus{border-color:var(--nch)}
.preset-sel{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx3);font-size:11px;padding:4px 8px;cursor:pointer;outline:none}
.apply-btn{background:rgba(212,164,76,.15);border:1px solid rgba(212,164,76,.5);border-radius:6px;color:var(--nch);cursor:pointer;font-size:11px;font-weight:700;padding:5px 12px;transition:all .15s;flex-shrink:0}
.apply-btn:hover{background:rgba(212,164,76,.25)}

/* Summary strip */
.sum-strip{
  position:fixed;top:var(--hdr);left:0;right:0;z-index:190;
  background:var(--s1);border-bottom:1px solid var(--bd);
  display:flex;align-items:center;gap:0;height:var(--sum);padding:0;
  overflow-x:auto;
}
.sum-card{flex:1;min-width:120px;padding:10px 16px;border-right:1px solid var(--bd)}
.sum-card:last-child{border-right:none}
.sum-lbl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.sum-val{font-size:18px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.2}
.sum-sub{font-size:10px;color:var(--tx3);margin-top:2px}

/* Main two-pane */
.main-wrap{
  display:flex;
  position:fixed;
  top:calc(var(--hdr) + var(--sum));
  left:0;right:0;
  bottom:0;
  overflow:hidden;
}
.left-pane{
  width:400px;min-width:280px;
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  overflow:hidden;flex-shrink:0;
}
.right-pane{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
}
.pane-hdr{
  background:var(--s1);border-bottom:1px solid var(--bd);
  padding:10px 14px;display:flex;align-items:center;gap:8px;
  flex-shrink:0;
}
.pane-title{font-size:12px;font-weight:700;color:var(--tx);text-transform:uppercase;letter-spacing:.5px;flex:1}
.pane-action{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:600;padding:4px 10px;transition:all .1s}
.pane-action:hover{border-color:var(--nch);color:var(--nch)}
.pane-action.xlsx:hover{border-color:var(--gn);color:var(--gn)}
.left-scroll{flex:1;overflow-y:auto}

/* Sort bar */
.sort-bar{display:flex;gap:4px;padding:8px 14px;background:var(--bg);border-bottom:1px solid var(--bd);flex-shrink:0}
.sort-lbl{font-size:10px;color:var(--tx3);padding-top:2px}
.sort-btn{background:none;border:1px solid var(--bd);border-radius:5px;color:var(--tx3);cursor:pointer;font-size:10px;font-weight:600;padding:3px 9px;transition:all .1s}
.sort-btn.active{background:var(--s2);color:var(--tx);border-color:var(--tx3)}
.sort-btn:hover{border-color:var(--nch)}

/* Item rows */
.item-row{padding:10px 14px;border-bottom:1px solid #0d0d18;transition:background .1s;cursor:default}
.item-row:hover{background:var(--s2)}
.item-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.item-rank{font-size:10px;color:var(--tx3);width:18px;flex-shrink:0;padding-top:2px;font-variant-numeric:tabular-nums}
.item-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.item-name{flex:1;font-size:12px;font-weight:600;color:var(--tx);line-height:1.3}
.item-cat{font-size:9px;font-weight:600;padding:1px 5px;border-radius:3px;margin-left:4px;flex-shrink:0;margin-top:2px}
.item-stats{display:flex;gap:10px;padding-left:26px;margin-bottom:5px}
.stat-block{text-align:center}
.stat-v{font-size:14px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.2}
.stat-l{font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.3px}
.item-bar-bg{background:var(--s3);border-radius:3px;height:4px;margin:0 0 2px 26px;overflow:hidden}
.item-bar-fill{height:100%;border-radius:3px}
.item-pct{font-size:9px;color:var(--tx3);padding-left:26px}

/* Day rows */
.day-wrap{border-bottom:1px solid #0d0d18}
.day-row{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  cursor:pointer;transition:background .1s;
}
.day-row:hover{background:var(--s1)}
.day-row.open{background:var(--s1)}
.day-date{font-weight:700;font-size:13px;color:var(--tx);width:100px;flex-shrink:0}
.day-dow{font-size:11px;color:var(--tx3);width:32px;flex-shrink:0}
.day-rev-bar{flex:1;display:flex;align-items:center;gap:6px}
.day-rev-track{flex:1;background:var(--s3);border-radius:3px;height:5px;overflow:hidden;max-width:120px}
.day-rev-fill{height:100%;border-radius:3px}
.day-rev-amt{font-size:13px;font-weight:700;font-variant-numeric:tabular-nums;width:80px;text-align:right;flex-shrink:0}
.day-orders{font-size:11px;color:var(--tx3);width:60px;text-align:right;flex-shrink:0}
.day-chv{font-size:12px;color:var(--tx3);margin-left:4px;transition:transform .2s;flex-shrink:0}
.day-row.open .day-chv{transform:rotate(180deg)}
.print-day-btn{background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--tx3);cursor:pointer;font-size:9px;font-weight:600;padding:3px 7px;transition:all .1s;flex-shrink:0}
.print-day-btn:hover{border-color:var(--nch);color:var(--nch)}

/* Day detail */
.day-detail{display:none;background:#080810;border-top:1px solid #0d0d18}
.day-detail.show{display:block}
.detail-table{width:100%;border-collapse:collapse}
.detail-table th{background:#0d0d18;color:var(--tx3);font-size:10px;font-weight:600;letter-spacing:.4px;padding:7px 16px;text-align:left;text-transform:uppercase}
.detail-table th.num{text-align:right}
.detail-table td{border-bottom:1px solid #0d0d1a;color:var(--tx2);padding:7px 16px;font-size:12px;vertical-align:middle}
.detail-table tr:last-child td{border-bottom:none}
.detail-table tr:hover td{background:#0d0d18}
.detail-table .num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace}
.detail-table .bold{font-weight:700;color:var(--tx)}
.detail-table .tr-sub td{background:#0e0e1a;font-weight:700;color:var(--tx);border-top:1px solid var(--bd)}
.detail-item-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0;vertical-align:middle}

/* Bottom bar in right pane */
.right-bottom{
  position:sticky;bottom:0;
  background:var(--s1);border-top:1px solid var(--bd);
  padding:10px 16px;display:flex;gap:8px;align-items:center;
}
.rb-btn{background:var(--s2);border:1px solid var(--bd);border-radius:7px;color:var(--tx3);cursor:pointer;font-size:11px;font-weight:600;padding:7px 14px;transition:all .15s}
.rb-btn:hover{border-color:var(--nch);color:var(--nch)}
.rb-btn.primary{background:rgba(212,164,76,.12);border-color:rgba(212,164,76,.4);color:var(--nch)}
.rb-btn.xlsx-btn:hover{border-color:var(--gn);color:var(--gn)}
.rb-info{margin-left:auto;font-size:11px;color:var(--tx3)}

/* Mobile */
@media(max-width:900px){
  :root{--hdr:auto;--sum:auto}
  .hdr{position:relative;height:auto;flex-wrap:wrap;padding:10px 14px;gap:8px}
  .date-row{margin-left:0;flex-wrap:wrap}
  .sum-strip{position:relative;top:0;height:auto;flex-wrap:wrap}
  .sum-card{min-width:calc(50% - 1px);border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
  .main-wrap{position:relative;top:0;bottom:auto;flex-direction:column;overflow:visible}
  .left-pane{width:100%;border-right:none;border-bottom:1px solid var(--bd)}
  .left-scroll{overflow:visible;max-height:none}
  .right-pane{overflow:visible}
  .right-bottom{position:relative}
}

/* Print */
@media print{
  :root{--bg:#fff;--tx:#111;--tx2:#333;--tx3:#666;--s1:#f8f8f8;--s2:#f0f0f0;--bd:#ddd}
  body{background:#fff;color:#111;font-size:11px}
  .no-print,.hdr,.sum-strip,.sort-bar,.pane-hdr,.right-bottom,.pin-screen,.print-day-btn,.pane-action,.apply-btn,.brand-tabs,.date-row,.preset-sel,.btab,.day-chv,.rb-btn{display:none!important}
  .main-wrap{position:static;flex-direction:column;overflow:visible}
  .left-pane,.right-pane{width:100%;overflow:visible}
  .item-bar-bg,.item-bar-fill{display:none}
  .day-detail{display:block!important}
  @page{margin:14mm 12mm}
}
</style>
</head>

<!-- PIN -->
<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-logo" id="pin-logo">HN Sales</div>
    <div class="pin-sub">NCH · Hamza Express · Sales Register</div>
    <div class="pin-dots"><div class="pin-dot" id="d0"></div><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div></div>
    <div class="pin-pad" id="pin-pad"></div>
    <div class="pin-err" id="pin-err"></div>
  </div>
</div>

<!-- App -->
<div id="app">
  <!-- Header -->
  <div class="hdr no-print">
    <div class="hdr-logo" id="hdr-logo">ن HN</div>
    <div class="brand-tabs">
      <button class="btab on-nch" id="btab-nch" onclick="setBrand('nch')">ن NCH</button>
      <button class="btab" id="btab-he" onclick="setBrand('he')">🍚 HE</button>
    </div>
    <div class="date-row">
      <span class="dt-lbl">From</span>
      <input class="dt-inp" type="date" id="dt-from">
      <span class="dt-lbl">→</span>
      <input class="dt-inp" type="date" id="dt-to">
      <select class="preset-sel" id="preset-sel" onchange="setPreset(this.value)">
        <option value="">Presets…</option>
        <option value="naveen">Naveen Period (Feb 3 – Mar 31)</option>
        <option value="feb">February (NCH first month)</option>
        <option value="mar">March</option>
        <option value="he-start">HE Launch (Feb 27 – Mar 31)</option>
        <option value="all">All Data</option>
      </select>
      <button class="apply-btn" onclick="applyFilters()">Apply</button>
    </div>
  </div>

  <!-- Summary strip -->
  <div class="sum-strip no-print" id="sum-strip"></div>

  <!-- Two-pane main -->
  <div class="main-wrap">

    <!-- LEFT: Item Totals -->
    <div class="left-pane">
      <div class="pane-hdr no-print">
        <div class="pane-title" id="left-title">Item Totals</div>
        <button class="pane-action" onclick="printItems()">🖨 PDF</button>
        <button class="pane-action xlsx" onclick="dlXLSX('items')">📊 XLSX</button>
      </div>
      <div class="sort-bar no-print">
        <span class="sort-lbl">Sort:</span>
        <button class="sort-btn active" id="sb-qty" onclick="setSort('qty')">Qty ▾</button>
        <button class="sort-btn" id="sb-rev" onclick="setSort('rev')">Revenue</button>
        <button class="sort-btn" id="sb-name" onclick="setSort('name')">Name</button>
        <button class="sort-btn" id="sb-avg" onclick="setSort('avg')">Avg/Day</button>
      </div>
      <div class="left-scroll" id="left-scroll"></div>
    </div>

    <!-- RIGHT: Daily Breakdown -->
    <div class="right-pane" id="right-pane">
      <div class="pane-hdr no-print">
        <div class="pane-title" id="right-title">Daily Breakdown</div>
        <button class="pane-action" onclick="printRange()">🖨 Print Range</button>
        <button class="pane-action xlsx" onclick="dlXLSX('daily')">📊 XLSX</button>
      </div>
      <div id="daily-list"></div>
      <div class="right-bottom no-print">
        <button class="rb-btn primary" onclick="printRange()">🖨 Print Selected Range PDF</button>
        <button class="rb-btn xlsx-btn" onclick="dlXLSX('full')">📊 Download Full XLSX</button>
        <div class="rb-info" id="rb-info"></div>
      </div>
    </div>

  </div><!-- /main-wrap -->
</div><!-- /app -->

<script>
// ── PIN ──────────────────────────────────────────────────────────
var PINS=['0305','2026','3678'],pinVal='';
(function(){
  var pad=document.getElementById('pin-pad');
  [1,2,3,4,5,6,7,8,9,'','0','⌫'].forEach(function(k){
    var b=document.createElement('button');b.className='pin-btn';b.textContent=k;
    if(k===''){b.style.visibility='hidden';}
    else{b.addEventListener('click',function(){
      if(k==='⌫'){pinVal=pinVal.slice(0,-1);}else if(pinVal.length<4){pinVal+=String(k);}
      upD();if(pinVal.length===4)chkP();
    });}
    pad.appendChild(b);
  });
})();
function upD(){for(var i=0;i<4;i++)document.getElementById('d'+i).className='pin-dot'+(i<pinVal.length?' filled':'');document.getElementById('pin-err').textContent='';}
function chkP(){
  if(PINS.indexOf(pinVal)>=0){document.getElementById('pin-screen').style.display='none';document.getElementById('app').style.display='block';init();}
  else{document.getElementById('pin-err').textContent='Incorrect PIN';pinVal='';upD();}
}

function heCat(name){
  var n=name.toLowerCase();
  if(/biryani|rice/.test(n)) return {cat:'Biryani',clr:'#f59e0b'};
  if(/chicken/.test(n))      return {cat:'Chicken',clr:'#ef4444'};
  if(/kabab|tikka|reshmi|kalmi|seekh|garlic/.test(n)) return {cat:'Kabab',clr:'#dc2626'};
  if(/naan|roti|paratha|bread/.test(n)) return {cat:'Breads',clr:'#a16207'};
  if(/mutton|lamb/.test(n))  return {cat:'Mutton',clr:'#7c3aed'};
  if(/drink|soft|sprite|cola|water|cold/.test(n)) return {cat:'Drinks',clr:'#0ea5e9'};
  if(/shawarma|roll/.test(n)) return {cat:'Snacks',clr:'#f97316'};
  if(/paneer|veg|kofta/.test(n)) return {cat:'Veg',clr:'#22c55e'};
  return {cat:'Other',clr:'#64748b'};
}

function getItemCat(key,brand){
  if(brand==='nch') return NCH_CATMAP[key]||{cat:'Other',clr:'#8b5cf6'};
  return heCat(cleanName(key));
}

function cleanName(n){return n.replace(/^\[(?:NCH|HE|HN)-[^\]]+\]\s*/,'');}
function fDate(d){
  var dt=new Date(d+'T00:00:00');
  return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short'});
}
function fDow(d){return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{weekday:'short'});}
function fRev(n){return '\u20b9'+Math.round(n).toLocaleString('en-IN');}
function fQty(n){return n%1===0?n.toFixed(0):n.toFixed(1);}

var brand='nch', sortBy='qty', dateFrom='2026-02-03', dateTo='2026-03-31';

function setPreset(v){

function setSort(s){
  sortBy=s;
  ['qty','rev','name','avg'].forEach(function(x){
    document.getElementById('sb-'+x).className='sort-btn'+(x===s?' active':'');
  });
  renderItems(getRows());
}

function applyFilters(){
  dateFrom=document.getElementById('dt-from').value;
  dateTo=document.getElementById('dt-to').value;
  var rows=getRows();
  renderSummary(rows);
  renderItems(rows);
  renderDaily(rows);
  document.getElementById('rb-info').textContent=rows.length+' days · '+dateFrom+' → '+dateTo;
}

function getRows(){
  var src=(brand==='nch'?RAW.nch:RAW.he);
  return src.filter(function(r){return r.d>=dateFrom&&r.d<=dateTo;});
}

// ── SUMMARY ───────────────────────────────────────────────────────
function renderSummary(rows){
  var rev=rows.reduce(function(s,r){return s+r.g;},0);
  var ord=rows.reduce(function(s,r){return s+r.n;},0);
  var days=rows.length;
  var clr=(brand==='nch'?'var(--nch)':'var(--he)');
  // top item by qty
  var itTot=accItems(rows);
  var topItem=Object.entries(itTot).sort(function(a,b){return b[1].q-a[1].q;})[0];
  var topStr=topItem?cleanName(topItem[0])+' ('+fQty(topItem[1].q)+' units)':'—';
  document.getElementById('sum-strip').innerHTML=
    sc('Revenue',fRev(rev),'total in period',clr)+
    sc('Orders',ord.toLocaleString('en-IN'),'transactions',clr)+
    sc('Days',days,'in selected range',clr)+
    sc('Avg / Day',days?fRev(rev/days):fRev(0),'daily revenue',clr)+
    sc('Top Item',topStr,'by qty sold',clr);
}
function sc(l,v,s,c){return '<div class="sum-card"><div class="sum-lbl">'+l+'</div><div class="sum-val" style="color:'+c+'">'+v+'</div><div class="sum-sub">'+s+'</div></div>';}

// ── ITEM TOTALS ───────────────────────────────────────────────────
function accItems(rows){
  var t={};
  rows.forEach(function(r){
    Object.entries(r.items).forEach(function(kv){
      if(!t[kv[0]]) t[kv[0]]={q:0,a:0};
      t[kv[0]].q+=kv[1].q; t[kv[0]].a+=kv[1].a;
    });
  });
  return t;
}

function renderItems(rows){
  var tot=accItems(rows);
  var days=rows.length||1;
  var grandRev=Object.values(tot).reduce(function(s,v){return s+v.a;},0)||1;
  var maxQ=Object.values(tot).reduce(function(m,v){return Math.max(m,v.q);},0)||1;
  var maxR=Object.values(tot).reduce(function(m,v){return Math.max(m,v.a);},0)||1;
  var entries=Object.entries(tot);
  entries.sort(function(a,b){
    if(sortBy==='qty') return b[1].q-a[1].q;
    if(sortBy==='rev') return b[1].a-a[1].a;
    if(sortBy==='avg') return (b[1].q/days)-(a[1].q/days);
    return cleanName(a[0]).localeCompare(cleanName(b[0]));
  });
  var clr=(brand==='nch'?'var(--nch)':'var(--he)');
  var html='';
  entries.forEach(function(kv,i){
    var key=kv[0],v=kv[1];
    var ci=getItemCat(key,brand);
    var barW=(sortBy==='rev'||sortBy==='name'?v.a/maxR:v.q/maxQ)*100;
    var pct=(v.a/grandRev*100).toFixed(1);
    var avgD=(v.q/days).toFixed(1);
    html+='<div class="item-row">'
      +'<div class="item-top">'
      +'<span class="item-rank">'+(i+1)+'</span>'
      +'<span class="item-dot" style="background:'+ci.clr+'"></span>'
      +'<span class="item-name">'+cleanName(key)+'<span class="item-cat" style="background:'+ci.clr+'22;color:'+ci.clr+'">'+ci.cat+'</span></span>'
      +'</div>'
      +'<div class="item-stats">'
      +'<div class="stat-block"><div class="stat-v" style="color:'+clr+'">'+fQty(v.q)+'</div><div class="stat-l">Total Qty</div></div>'
      +'<div class="stat-block"><div class="stat-v">'+fRev(v.a)+'</div><div class="stat-l">Revenue</div></div>'
      +'<div class="stat-block"><div class="stat-v" style="color:'+ci.clr+'">'+avgD+'</div><div class="stat-l">Avg/Day</div></div>'
      +'<div class="stat-block"><div class="stat-v" style="color:var(--tx3)">'+pct+'%</div><div class="stat-l">Rev Share</div></div>'
      +'</div>'
      +'<div class="item-bar-bg"><div class="item-bar-fill" style="width:'+barW.toFixed(1)+'%;background:'+ci.clr+'"></div></div>'
      +'</div>';
  });
  document.getElementById('left-scroll').innerHTML=html;
  document.getElementById('left-title').textContent='Item Totals ('+entries.length+' products)';
}

// ── DAILY LIST ────────────────────────────────────────────────────
function renderDaily(rows){
  var maxG=rows.reduce(function(m,r){return Math.max(m,r.g);},0)||1;
  var clr=(brand==='nch'?'var(--nch)':'var(--he)');
  var html='';
  rows.forEach(function(row,i){
    var pct=(row.g/maxG*100).toFixed(1);
    html+='<div class="day-wrap">'
      +'<div class="day-row" id="dr-'+i+'" onclick="togDay('+i+')">'
      +'<span class="day-date">'+fDate(row.d)+'</span>'
      +'<span class="day-dow">'+fDow(row.d)+'</span>'
      +'<div class="day-rev-bar">'
      +'<div class="day-rev-track"><div class="day-rev-fill" style="width:'+pct+'%;background:'+clr+'"></div></div>'
      +'<span class="day-rev-amt" style="color:'+clr+'">'+fRev(row.g)+'</span>'
      +'</div>'
      +'<span class="day-orders">'+row.n+' orders</span>'
      +'<button class="print-day-btn no-print" onclick="event.stopPropagation();printDay('+i+')">🖨</button>'
      +'<span class="day-chv">▾</span>'
      +'</div>'
      +'<div class="day-detail" id="dd-'+i+'">'
      +buildDayDetail(row)
      +'</div>'
      +'</div>';
  });
  document.getElementById('daily-list').innerHTML=html;
  document.getElementById('right-title').textContent='Daily Breakdown ('+rows.length+' days)';
}

function buildDayDetail(row){
  var items=Object.entries(row.items).sort(function(a,b){return b[1].a-a[1].a;});
  var tot=items.reduce(function(s,kv){return s+kv[1].a;},0);
  var clr=(brand==='nch'?'var(--nch)':'var(--he)');
  var h='<table class="detail-table"><thead><tr>'
    +'<th>Product</th><th class="num">Qty</th><th class="num">Unit ₹</th><th class="num">Revenue</th>'
    +'</tr></thead><tbody>';
  items.forEach(function(kv){
    var ci=getItemCat(kv[0],brand);
    var unit=kv[1].q?kv[1].a/kv[1].q:0;
    h+='<tr><td><span class="detail-item-dot" style="background:'+ci.clr+'"></span>'+cleanName(kv[0])+'</td>'
      +'<td class="num bold">'+fQty(kv[1].q)+'</td>'
      +'<td class="num" style="color:var(--tx3)">'+fRev(unit)+'</td>'
      +'<td class="num" style="color:'+clr+'">'+fRev(kv[1].a)+'</td></tr>';
  });
  h+='<tr class="tr-sub"><td class="bold">Day Total</td><td class="num">—</td><td class="num">—</td>'
    +'<td class="num">'+fRev(tot)+'</td></tr>';
  h+='</tbody></table>';
  return h;
}

function togDay(i){
  var row=document.getElementById('dr-'+i);
  var det=document.getElementById('dd-'+i);
  var open=det.classList.toggle('show');
  row.classList.toggle('open',open);
}

function printDay(i){
  var rows=getRows();
  var row=rows[i]; if(!row) return;
  var items=Object.entries(row.items).sort(function(a,b){return b[1].a-a[1].a;});
  var tot=items.reduce(function(s,kv){return s+kv[1].a;},0);
  var totQ=items.reduce(function(s,kv){return s+kv[1].q;},0);
  var brandName=(brand==='nch'?'Nawabi Chai House':'Hamza Express');
  var tbl='<table><thead><tr><th>#</th><th>Product</th><th class="r">Qty</th><th class="r">Unit ₹</th><th class="r">Revenue</th></tr></thead><tbody>';
  items.forEach(function(kv,n){
    var unit=kv[1].q?kv[1].a/kv[1].q:0;
    tbl+='<tr><td class="b">'+(n+1)+'</td><td>'+cleanName(kv[0])+'</td>'
      +'<td class="r b">'+fQty(kv[1].q)+'</td>'
      +'<td class="r">'+fRev(unit)+'</td>'
      +'<td class="r">'+fRev(kv[1].a)+'</td></tr>';
  });
  tbl+='<tr class="tr-tot"><td colspan="2">Total</td><td class="r">'+fQty(totQ)+'</td><td class="r">—</td><td class="r">'+fRev(tot)+'</td></tr></tbody></table>';
  openPrint(brandName+' — '+fDate(row.d),
    '<h1>'+brandName+'</h1><div class="sub">Daily Sales — '+fDate(row.d)+', '+fDow(row.d)+' ('+row.d+')</div>'
    +'<div class="meta">POS Sales · Odoo 19 · Generated '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+'</div>'
    +'<div class="stats">'
    +'<div class="sbox"><div class="sl">Revenue</div><div class="sv">'+fRev(tot)+'</div></div>'
    +'<div class="sbox"><div class="sl">Orders</div><div class="sv">'+row.n+'</div></div>'
    +'<div class="sbox"><div class="sl">Items Sold</div><div class="sv">'+items.length+'</div></div>'
    +'<div class="sbox"><div class="sl">Avg Ticket</div><div class="sv">'+fRev(row.n?tot/row.n:0)+'</div></div>'
    +'</div>'+tbl);
}

// ── PRINT: range ─────────────────────────────────────────────────
function printRange(){
  var rows=getRows();
  var brandName=(brand==='nch'?'Nawabi Chai House':'Hamza Express');
  var grandRev=rows.reduce(function(s,r){return s+r.g;},0);
  var grandOrd=rows.reduce(function(s,r){return s+r.n;},0);
  // Day-by-day table
  var dTbl='<table><thead><tr><th>Date</th><th>Day</th><th class="r">Orders</th><th class="r">Revenue</th><th class="r">Avg Ticket</th></tr></thead><tbody>';
  rows.forEach(function(row){
    dTbl+='<tr><td class="b">'+row.d+'</td><td>'+fDow(row.d)+'</td>'
      +'<td class="r">'+row.n+'</td>'
      +'<td class="r">'+fRev(row.g)+'</td>'
      +'<td class="r">'+fRev(row.n?row.g/row.n:0)+'</td></tr>';
  });
  dTbl+='<tr class="tr-tot"><td colspan="2">Total</td><td class="r">'+grandOrd+'</td><td class="r">'+fRev(grandRev)+'</td><td class="r">'+fRev(grandOrd?grandRev/grandOrd:0)+'</td></tr></tbody></table>';
  // Item accumulation
  var tot=accItems(rows);
  var days=rows.length||1;
  var sortedItems=Object.entries(tot).sort(function(a,b){return b[1].q-a[1].q;});
  var iTbl='<table><thead><tr><th>#</th><th>Product</th><th>Category</th><th class="r">Total Qty</th><th class="r">Revenue</th><th class="r">Avg Qty/Day</th><th class="r">Rev %</th></tr></thead><tbody>';
  sortedItems.forEach(function(kv,n){
    var ci=getItemCat(kv[0],brand);
    var pct=(kv[1].a/grandRev*100).toFixed(1);
    var avg=(kv[1].q/days).toFixed(1);
    iTbl+='<tr><td class="b">'+(n+1)+'</td><td>'+cleanName(kv[0])+'</td><td>'+ci.cat+'</td>'
      +'<td class="r b">'+fQty(kv[1].q)+'</td>'
      +'<td class="r">'+fRev(kv[1].a)+'</td>'
      +'<td class="r">'+avg+'</td>'
      +'<td class="r">'+pct+'%</td></tr>';
  });
  iTbl+='<tr class="tr-tot"><td colspan="3">Total</td><td class="r">—</td><td class="r">'+fRev(grandRev)+'</td><td class="r">—</td><td class="r">100%</td></tr></tbody></table>';
  openPrint(brandName+' Sales '+dateFrom+' to '+dateTo,
    '<h1>'+brandName+'</h1><div class="sub">Sales Register · '+dateFrom+' to '+dateTo+'</div>'
    +'<div class="meta">'+rows.length+' days · '+grandOrd.toLocaleString()+' orders · '+fRev(grandRev)+' total · Generated '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+'</div>'
    +'<div class="stats">'
    +'<div class="sbox"><div class="sl">Total Revenue</div><div class="sv">'+fRev(grandRev)+'</div></div>'
    +'<div class="sbox"><div class="sl">Total Orders</div><div class="sv">'+grandOrd.toLocaleString()+'</div></div>'
    +'<div class="sbox"><div class="sl">Days</div><div class="sv">'+rows.length+'</div></div>'
    +'<div class="sbox"><div class="sl">Avg / Day</div><div class="sv">'+fRev(grandRev/days)+'</div></div>'
    +'</div>'
    +'<h2 style="font-size:14px;font-weight:700;margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #b8860b">Daily Breakdown</h2>'+dTbl
    +'<h2 style="font-size:14px;font-weight:700;margin:18px 0 8px;padding-bottom:5px;border-bottom:1px solid #b8860b">Item Accumulation (sorted by qty)</h2>'+iTbl);
}

// ── PRINT: items only ─────────────────────────────────────────────
function printItems(){
  var rows=getRows();
  var brandName=(brand==='nch'?'Nawabi Chai House':'Hamza Express');
  var tot=accItems(rows);
  var days=rows.length||1;
  var grandRev=rows.reduce(function(s,r){return s+r.g;},0);
  var sorted=Object.entries(tot).sort(function(a,b){return b[1].q-a[1].q;});
  var tbl='<table><thead><tr><th>#</th><th>Product</th><th>Category</th><th class="r">Total Qty</th><th class="r">Revenue</th><th class="r">Avg Qty/Day</th><th class="r">Rev %</th></tr></thead><tbody>';
  sorted.forEach(function(kv,n){
    var ci=getItemCat(kv[0],brand);
    var pct=(kv[1].a/grandRev*100).toFixed(1);
    tbl+='<tr><td class="b">'+(n+1)+'</td><td>'+cleanName(kv[0])+'</td><td>'+ci.cat+'</td>'
      +'<td class="r b">'+fQty(kv[1].q)+'</td>'
      +'<td class="r">'+fRev(kv[1].a)+'</td>'
      +'<td class="r">'+(kv[1].q/days).toFixed(1)+'</td>'
      +'<td class="r">'+pct+'%</td></tr>';
  });
  tbl+='<tr class="tr-tot"><td colspan="3">Total</td><td class="r">—</td><td class="r">'+fRev(grandRev)+'</td><td class="r">—</td><td class="r">100%</td></tr></tbody></table>';
  openPrint(brandName+' Item Totals',
    '<h1>'+brandName+'</h1><div class="sub">Item Accumulation · '+dateFrom+' to '+dateTo+'</div>'
    +'<div class="meta">'+rows.length+' days · Sorted by total qty sold · Generated '+new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+'</div>'
    +'<div class="stats">'
    +'<div class="sbox"><div class="sl">Total Revenue</div><div class="sv">'+fRev(grandRev)+'</div></div>'
    +'<div class="sbox"><div class="sl">Unique Items</div><div class="sv">'+sorted.length+'</div></div>'
    +'<div class="sbox"><div class="sl">Period</div><div class="sv" style="font-size:13px">'+days+' days</div></div>'
    +'</div>'+tbl);
}

function openPrint(title,body){
  var w=window.open('','_blank','width=980,height=800');
  w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>'+title+'</title><style>'+PSTYLE+'</style></head><body>'
    +body
    +'<div class="footer">HN Hotels Pvt Ltd &nbsp;·&nbsp; Confidential &nbsp;·&nbsp; '+title+'</div>'
    +'</body></html>');
  w.document.close();
  setTimeout(function(){w.print();},700);
}

// ── XLSX ──────────────────────────────────────────────────────────
function dlXLSX(mode){
  if(typeof XLSX==='undefined'){alert('XLSX library loading — try again.');return;}
  var rows=getRows();
  var brandName=(brand==='nch'?'Nawabi Chai House':'Hamza Express');
  var wb=XLSX.utils.book_new();

  if(mode==='items'||mode==='full'){
    var tot=accItems(rows);
    var days=rows.length||1;
    var grandRev=rows.reduce(function(s,r){return s+r.g;},0);
    var sorted=Object.entries(tot).sort(function(a,b){return b[1].q-a[1].q;});
    var aoa=[[brandName+' — Item Accumulation'],['Period: '+dateFrom+' to '+dateTo],['Days: '+days],[]];
    aoa.push(['Rank','Product','Category','Total Qty','Revenue (₹)','Avg Qty/Day','Rev %']);
    sorted.forEach(function(kv,n){
      var ci=getItemCat(kv[0],brand);
      var pct=(kv[1].a/grandRev*100).toFixed(1);
      aoa.push([n+1,cleanName(kv[0]),ci.cat,+kv[1].q.toFixed(1),Math.round(kv[1].a),+(kv[1].q/days).toFixed(1),pct+'%']);
    });
    aoa.push(['','TOTAL','',null,Math.round(grandRev),null,'100%']);
    var ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:6},{wch:36},{wch:12},{wch:12},{wch:14},{wch:14},{wch:10}];
    XLSX.utils.book_append_sheet(wb,ws,'Item Totals');
  }

  if(mode==='daily'||mode==='full'){
    var grandRev2=rows.reduce(function(s,r){return s+r.g;},0);
    var grandOrd=rows.reduce(function(s,r){return s+r.n;},0);
    var aoa2=[[brandName+' — Daily Totals'],['Period: '+dateFrom+' to '+dateTo],[]];
    aoa2.push(['Date','Day','Orders','Revenue (₹)','Avg Ticket (₹)']);
    rows.forEach(function(row){aoa2.push([row.d,fDow(row.d),row.n,Math.round(row.g),Math.round(row.n?row.g/row.n:0)]);});
    aoa2.push(['TOTAL','',grandOrd,Math.round(grandRev2),Math.round(grandOrd?grandRev2/grandOrd:0)]);
    var ws2=XLSX.utils.aoa_to_sheet(aoa2);
    ws2['!cols']=[{wch:14},{wch:8},{wch:10},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws2,'Daily Totals');
  }

  if(mode==='full'){
    var aoa3=[[brandName+' — Day × Item Detail'],['Period: '+dateFrom+' to '+dateTo],[]];
    aoa3.push(['Date','Day','Product','Category','Qty','Revenue (₹)','Unit Price (₹)']);
    rows.forEach(function(row){
      var its=Object.entries(row.items).sort(function(a,b){return b[1].a-a[1].a;});
      its.forEach(function(kv){
        var ci=getItemCat(kv[0],brand);
        var unit=kv[1].q?kv[1].a/kv[1].q:0;
        aoa3.push([row.d,fDow(row.d),cleanName(kv[0]),ci.cat,+kv[1].q.toFixed(1),Math.round(kv[1].a),Math.round(unit)]);
      });
    });
    var ws3=XLSX.utils.aoa_to_sheet(aoa3);
    ws3['!cols']=[{wch:14},{wch:8},{wch:36},{wch:12},{wch:10},{wch:14},{wch:14}];
    XLSX.utils.book_append_sheet(wb,ws3,'Day x Item');
  }

  var fname='HN_Sales_'+brand+'_'+dateFrom+'_'+dateTo+(mode==='items'?'_items':(mode==='daily'?'_daily':'_full'))+'.xlsx';
  XLSX.writeFile(wb,fname);
}
