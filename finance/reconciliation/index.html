<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>HN Hotels - Financial Reconciliation</title>
<style>
:root{--bg:#0a0a0f;--s1:#12121a;--s2:#1a1a26;--bd:#2a2a3a;--tx:#e0e0e8;--dm:#8888a0;--ac:#d4a44c;--gn:#22c55e;--rd:#ef4444;--or:#f97316;--bl:#3b82f6;--pp:#a855f7;--cy:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;-webkit-font-smoothing:antialiased}

#pin-gate{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center}
#pin-gate.hidden{display:none}
#pin-gate h2{color:var(--ac);font-size:1.4rem;margin-bottom:1.5rem;letter-spacing:1px}
.pin-input{display:flex;gap:12px;margin-bottom:1rem}
.pin-input input{width:48px;height:56px;text-align:center;font-size:1.5rem;background:var(--s1);border:2px solid var(--bd);border-radius:10px;color:var(--tx);outline:none;-webkit-text-security:disc}
.pin-input input:focus{border-color:var(--ac)}
.pin-err{color:var(--rd);font-size:.85rem;min-height:1.2em}

#main{display:none;padding:16px;max-width:1100px;margin:0 auto}
#main.visible{display:block}

.header{text-align:center;padding:20px 0 16px}
.header h1{font-size:1.2rem;color:var(--ac);font-weight:700}
.header .sub{color:var(--dm);font-size:.82rem;margin-top:4px}

.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 8px;text-align:center}
.card .lbl{font-size:.7rem;color:var(--dm);text-transform:uppercase;letter-spacing:.5px}
.card .val{font-size:1.4rem;font-weight:700;margin-top:2px}

.tbl-wrap{overflow-x:auto;margin-bottom:20px;-webkit-overflow-scrolling:touch}
table.mt{width:100%;border-collapse:collapse;font-size:.78rem;min-width:700px}
table.mt th{background:var(--s2);color:var(--dm);padding:8px 6px;text-align:right;font-weight:600;border-bottom:1px solid var(--bd);white-space:nowrap}
table.mt th:first-child{text-align:left}
table.mt td{padding:7px 6px;text-align:right;border-bottom:1px solid var(--bd);white-space:nowrap}
table.mt td:first-child{text-align:left;color:var(--ac);font-weight:600}
table.mt tr.tot td{border-top:2px solid var(--ac);font-weight:700}

.chart-wrap{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:20px}
.chart-wrap h3{color:var(--ac);font-size:.95rem;margin-bottom:10px;text-align:center}
.chart-wrap canvas{width:100%!important;height:220px!important}

.daily-hdr{font-size:1.05rem;color:var(--ac);margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--bd)}

.dc{background:var(--s1);border:1px solid var(--bd);border-radius:10px;margin-bottom:8px;overflow:hidden}
.dh{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;cursor:pointer;flex-wrap:wrap;gap:4px 12px}
.dh:hover{background:var(--s2)}
.dd{font-weight:700;color:var(--ac);font-size:.9rem;min-width:120px}
.ds{display:flex;gap:12px;flex-wrap:wrap;font-size:.78rem}
.ds span{white-space:nowrap}
.db{display:none;padding:0 14px 14px}
.dc.open .db{display:block}

.dt{margin-bottom:6px}
.dt-h{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:7px;cursor:pointer;font-size:.82rem;font-weight:600;background:var(--s2)}
.dt-h:hover{opacity:.9}
.dt-h .ar{transition:transform .2s;font-size:.65rem;margin-right:6px}
.dt.open .dt-h .ar{transform:rotate(90deg)}
.dt-c{display:none;padding:6px 10px;font-size:.78rem}
.dt.open .dt-c{display:block}

.bb{margin:6px 0;padding:6px 10px;background:rgba(255,255,255,.03);border-radius:6px;border-left:3px solid var(--bd)}
.bb.nch{border-left-color:var(--ac)}
.bb.he{border-left-color:var(--or)}
.bl{font-weight:700;font-size:.82rem;margin-bottom:4px}
.bl.nch{color:var(--ac)}.bl.he{color:var(--or)}

.pt{width:100%;font-size:.76rem}
.pt td{padding:2px 4px}
.pt td:nth-child(2){color:var(--dm);text-align:center}
.pt td:nth-child(3){color:var(--dm);text-align:right}
.pt td:nth-child(4){color:var(--gn);text-align:right;font-weight:500}

.pr{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px;font-size:.76rem}
.pc{background:var(--s2);padding:2px 7px;border-radius:4px}
.rc{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);padding:2px 7px;border-radius:4px;color:var(--pp)}

.ec{margin:4px 0;padding:5px 8px;border-radius:5px;background:rgba(255,255,255,.02)}
.ec-h{font-weight:600;font-size:.8rem;margin-bottom:3px}
.ec.rm .ec-h{color:var(--gn)}
.ec.sal .ec-h{color:var(--bl)}
.ec.util .ec-h{color:var(--cy)}
.ec.capex .ec-h{color:var(--or)}
.ec.oth .ec-h{color:var(--dm)}
.ei{display:flex;justify-content:space-between;font-size:.76rem;padding:1px 0;color:var(--dm)}
.ei .a{color:var(--tx)}

.ur{display:flex;flex-wrap:wrap;gap:12px;padding:6px 10px;background:var(--s2);border-radius:7px;font-size:.8rem;color:var(--dm);margin-bottom:4px}
.ur strong{color:var(--tx)}

.ms{text-align:center;padding:14px;margin:14px 0;border-top:2px solid var(--ac);border-bottom:2px solid var(--ac);background:var(--s1);border-radius:8px}
.ms h3{color:var(--ac);font-size:.95rem}
.ms .st{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:6px;font-size:.82rem}

.gt{background:var(--s1);border:2px solid var(--ac);border-radius:12px;padding:18px;margin:20px 0}
.gt h3{color:var(--ac);font-size:1rem;margin-bottom:10px;text-align:center}
.gg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.gi{text-align:center}
.gi .gl{font-size:.7rem;color:var(--dm);text-transform:uppercase}
.gi .gv{font-size:1.1rem;font-weight:700}

.fl{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px;margin:20px 0}
.fl h3{color:var(--or);margin-bottom:10px;font-size:.95rem}
.fl ul{list-style:none}
.fl li{padding:5px 0;font-size:.82rem;color:var(--dm);border-bottom:1px solid rgba(255,255,255,.05);display:flex;gap:6px}
.fl li:last-child{border-bottom:none}
.fl .d{color:var(--or);font-weight:bold}

@media(max-width:600px){
  .cards{grid-template-columns:1fr}
  .card .val{font-size:1.2rem}
  .dh{padding:8px 10px}
  .gg{grid-template-columns:1fr 1fr}
  #main{padding:8px}
  .header h1{font-size:1rem}
}
</style>

    });
  });
})();

function fmt(n){
  if(n===0)return"\u20B90";
  var neg=n<0;var abs=Math.abs(Math.round(n));var s=abs.toString();
  if(s.length>3){var l3=s.slice(-3);var r=s.slice(0,-3);var p=[];
    while(r.length>2){p.unshift(r.slice(-2));r=r.slice(0,-2)}
    if(r)p.unshift(r);s=p.join(",")+","+l3}
  return(neg?"-":"")+"\u20B9"+s;
}
function fmtL(n){return"\u20B9"+(n/100000).toFixed(2)+"L"}

function mStats(days){
  var rev=0,rm=0,sal=0,ut=0,oth=0,cx=0;
  days.forEach(function(d){
    rev+=d.total_revenue;
    d.expenses.forEach(function(e){
      if(e.cat.indexOf("RM")===0)rm+=e.d;
      else if(e.cat==="Salary Expense")sal+=e.d;
      else if(e.cat.indexOf("Utility")===0)ut+=e.d;
      else if(e.cat==="CapEx")cx+=e.d;
      else if(OPEX_CATS.indexOf(e.cat)!==-1)oth+=e.d;
    });
  });
  var to=rm+sal+ut+oth;
  return{rev:rev,rm:rm,sal:sal,ut:ut,oth:oth,to:to,cx:cx,pnl:rev-to};
}

function dOpex(d){var s=0;d.expenses.forEach(function(e){if(OPEX_CATS.indexOf(e.cat)!==-1)s+=e.d});return s}
function dCapex(d){var s=0;d.expenses.forEach(function(e){if(e.cat==="CapEx")s+=e.d});return s}

      if(d.he.comp_amount>0){
        h+="<div style=\"color:var(--dm);font-size:.76rem;margin-top:3px\">Comp: "+fmt(d.he.comp_amount)+" ("+d.he.comp_count+")</div>";
      }
    }else{
      h+="<div style=\"color:var(--dm);font-size:.78rem\">"+(d.date<"2026-03-01"?"HE not started":"No data")+"</div>";
    }
    h+="</div>";
    h+="</div></div>";

    // Expense Detail Section
    if(d.expenses.length>0){
      var te=0;d.expenses.forEach(function(e){te+=e.d});
      h+="<div class=\"dt\"><div class=\"dt-h\" onclick=\"tT(this)\" style=\"color:var(--or);border-left:3px solid var(--or)\"><span><span class=\"ar\">&#9654;</span> Expense Detail</span><span>"+fmt(Math.round(te))+"</span></div><div class=\"dt-c\">";
      var cats={};
      d.expenses.forEach(function(e){if(!cats[e.cat])cats[e.cat]=[];cats[e.cat].push(e)});
      var sk=Object.keys(cats).sort(function(a,b){var ai=CAT_ORDER.indexOf(a),bi=CAT_ORDER.indexOf(b);return(ai===-1?999:ai)-(bi===-1?999:bi)});
      sk.forEach(function(cat){
        var items=cats[cat];var ct=0;items.forEach(function(e){ct+=e.d});
        h+="<div class=\"ec "+cc(cat)+"\"><div class=\"ec-h\">"+cat+" ("+fmt(Math.round(ct))+")</div>";
        items.forEach(function(e){
          h+="<div class=\"ei\"><span>"+e.p+"</span><span class=\"a\">"+fmt(Math.round(e.d))+"</span></div>";
        });
        h+="</div>";
      });
      h+="</div></div>";
    }

    // Razorpay / Paytm
    if(d.razorpay.gross>0||d.paytm.gross>0){
      h+="<div class=\"ur\">";
      if(d.razorpay.gross>0)h+="<span><strong>Razorpay</strong> "+fmt(Math.round(d.razorpay.gross))+" gross &middot; "+d.razorpay.txns+" txns &middot; "+fmt(Math.round(d.razorpay.charges+d.razorpay.igst))+" charges</span>";
      if(d.paytm.gross>0)h+="<span><strong>Paytm</strong> "+fmt(Math.round(d.paytm.gross))+" gross &middot; "+d.paytm.txns+" txns</span>";
      h+="</div>";
    }
    if(d.cash_naveen>0)h+="<div class=\"ur\"><span><strong>Cash &rarr; Naveen</strong> "+fmt(Math.round(d.cash_naveen))+"</span></div>";
    if(d.complimentary>0)h+="<div class=\"ur\"><span><strong>Complimentary</strong> "+fmt(Math.round(d.complimentary))+"</span></div>";
    if(d.capital>0)h+="<div class=\"ur\"><span style=\"color:var(--ac)\"><strong>Capital In</strong> "+fmt(Math.round(d.capital))+"</span></div>";

    h+="</div></div>";
  });

  // Final month separator (March)
  var marD=DATA.filter(function(x){return x.date.indexOf("2026-03")===0});
  var marS=mStats(marD);
  h+="<div class=\"ms\"><h3>March Total</h3><div class=\"st\">";
  h+="<span>Revenue "+fmt(Math.round(marS.rev))+"</span>";
  h+="<span>OpEx "+fmt(Math.round(marS.to))+"</span>";
  h+="<span>CapEx "+fmt(Math.round(marS.cx))+"</span>";
  h+="<span style=\""+(marS.pnl>=0?"color:var(--gn)":"color:var(--rd)")+"\">P&L "+fmt(Math.round(marS.pnl))+"</span>";
  h+="</div></div>";

  // Grand Total
  h+="<div class=\"gt\"><h3>Grand Total &mdash; 57 Days</h3><div class=\"gg\">";
  h+="<div class=\"gi\"><div class=\"gl\">Revenue</div><div class=\"gv\" style=\"color:var(--gn)\">"+fmtL(ts.rev)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">OpEx</div><div class=\"gv\" style=\"color:var(--rd)\">"+fmtL(ts.to)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">CapEx</div><div class=\"gv\" style=\"color:var(--or)\">"+fmtL(ts.cx)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">P&L</div><div class=\"gv\" style=\"color:"+(ts.pnl>=0?"var(--gn)":"var(--rd)")+"\">"+fmtL(ts.pnl)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">UPI Razorpay</div><div class=\"gv\">"+fmtL(gRz)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">UPI Paytm</div><div class=\"gv\">"+fmtL(gPt)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">Cash &rarr; Naveen</div><div class=\"gv\">"+fmtL(gCN)+"</div></div>";
  h+="<div class=\"gi\"><div class=\"gl\">Capital In</div><div class=\"gv\" style=\"color:var(--ac)\">"+fmtL(gCap)+"</div></div>";
  h+="</div></div>";

  // Flags
  var fam={};
  DATA.forEach(function(d){d.expenses.filter(function(e){return e.cat==="Family Withdrawal"}).forEach(function(e){
    var nm=e.p.split(" - ")[0].split(" Haneef")[0];if(!fam[nm])fam[nm]=0;fam[nm]+=e.d;
  })});
  var famS=Object.keys(fam).map(function(k){return k+" "+fmt(fam[k])}).join(", ");

  var salE=0;DATA.forEach(function(d){d.expenses.forEach(function(e){if(e.cat==="Salary Expense")salE+=e.d})});
  var polT=0,polC=0;
  DATA.forEach(function(d){d.expenses.filter(function(e){return e.cat==="Police"}).forEach(function(e){polT+=e.d;polC++})});

  var rzDates=DATA.filter(function(d){return d.razorpay.txns>0}).map(function(d){return d.date});
  var lastRz=rzDates.length>0?rzDates[rzDates.length-1]:"none";

  h+="<div class=\"fl\"><h3>Flags &amp; Notes</h3><ul>";
  h+="<li><span class=\"d\">*</span> HE started Mar 1 &mdash; no HE revenue in Feb</li>";
  if(lastRz<"2026-03-31")h+="<li><span class=\"d\">*</span> Razorpay DayBook recording stopped after "+lastRz+"</li>";
  h+="<li><span class=\"d\">*</span> Police payments: "+fmt(polT)+" across "+polC+" entries</li>";
  if(famS)h+="<li><span class=\"d\">*</span> Family withdrawals: "+famS+"</li>";
  h+="<li><span class=\"d\">*</span> Salary Expense booked "+fmtL(salE)+" but only "+fmtL(gSP)+" actually paid in cash</li>";
  h+="<li><span class=\"d\">*</span> Complimentary total: "+fmt(Math.round(gComp))+"</li>";
  h+="<li><span class=\"d\">*</span> Capital injected (incl. pre-period): "+fmtL(gCap)+"</li>";
  h+="</ul></div>";

  document.getElementById("content").innerHTML=h;

  // Draw chart after DOM is set
  drawChart();
}

function drawChart(){
  var ctx=document.getElementById("revChart");
  if(!ctx)return;
  var labels=DATA.map(function(d){var p=d.date.split("-");return parseInt(p[2])+"/"+(p[1]==="02"?"Feb":"Mar")});
  var nchData=DATA.map(function(d){return Math.round(d.nch.revenue)});
  var heData=DATA.map(function(d){return Math.round(d.he.revenue)});
  new Chart(ctx,{
    type:"bar",
    data:{
      labels:labels,
      datasets:[
        {label:"NCH",data:nchData,backgroundColor:"rgba(212,164,76,0.7)",borderRadius:3},
        {label:"HE",data:heData,backgroundColor:"rgba(249,115,22,0.7)",borderRadius:3}
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"#8888a0",font:{size:11}}},tooltip:{callbacks:{label:function(c){return c.dataset.label+": \u20B9"+c.raw.toLocaleString("en-IN")}}}},
      scales:{
        x:{stacked:true,ticks:{color:"#8888a0",font:{size:9},maxRotation:90},grid:{display:false}},
        y:{stacked:true,ticks:{color:"#8888a0",font:{size:10},callback:function(v){return"\u20B9"+(v/1000)+"k"}},grid:{color:"rgba(255,255,255,.05)"}}
      }
    }
  });
}

function tD(el){el.parentElement.classList.toggle("open")}
function tT(el){el.parentElement.classList.toggle("open")}

/* ========== DOWNLOAD FUNCTIONS ========== */
function dlReconCSV(){
  var h=['Date','Day','NCH Revenue','HE Revenue','Total Revenue','DB Sales','Gap','Raw Material','Salary','Utilities','CapEx','Other Exp','Total Exp','P&L','Cash to Naveen','Razorpay Gross','Razorpay Txns','Paytm Gross','Complimentary','Capital'];
  var rows=DATA.map(function(d){
    var opex=0;d.expenses.forEach(function(e){var c=e.cat;if(c&&c.indexOf('RM')===0||c==='Salary Expense'||c.indexOf('Utility')===0||c==='Consumables'||c==='Transport'||c==='Tech'||c==='Marketing'||c==='Police'||c==='Maintenance'||c==='Staff Welfare'||c==='Owner Draws'||c==='Stationery')opex+=e.d});
    var capex=0;d.expenses.forEach(function(e){if(e.cat==='CapEx')capex+=e.d});
    var rm=0;d.expenses.forEach(function(e){if(e.cat&&e.cat.indexOf('RM')===0)rm+=e.d});
    var sal=0;d.expenses.forEach(function(e){if(e.cat==='Salary Expense')sal+=e.d});
    var util=0;d.expenses.forEach(function(e){if(e.cat&&e.cat.indexOf('Utility')===0)util+=e.d});
    var oth=opex-rm-sal-util;
    return[d.date,d.day,d.nch.revenue,d.he.revenue,d.total_revenue,d.db_sales,d.total_revenue-d.db_sales,rm,sal,util,capex,oth,opex+capex,d.total_revenue-opex,d.cash_naveen,d.razorpay.gross,d.razorpay.txns,d.paytm.gross,d.complimentary,d.capital];
  });
  var csv=h.join(',')+'\n'+rows.map(function(r){return r.join(',')}).join('\n');
  var blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='HN_Reconciliation_Daily.csv';a.click();
}

function dlReconXLSX(){
  var h=['Date','Day','NCH Revenue','HE Revenue','Total Revenue','DB Sales','Gap','OpEx','CapEx','P&L','Cash to Naveen','Razorpay Gross','Paytm Gross'];
  var rows=DATA.map(function(d){
    var opex=0,capex=0;d.expenses.forEach(function(e){if(e.cat==='CapEx')capex+=e.d;else opex+=e.d});
    return[d.date,d.day,d.nch.revenue,d.he.revenue,d.total_revenue,d.db_sales,d.total_revenue-d.db_sales,opex,capex,d.total_revenue-opex,d.cash_naveen,d.razorpay.gross,d.paytm.gross];
  });
  var ws=XLSX.utils.aoa_to_sheet([h].concat(rows));
  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Daily Reconciliation');XLSX.writeFile(wb,'HN_Reconciliation_Daily.xlsx');
}

function dlReconMasterXLSX(){
  var wb=XLSX.utils.book_new();
  // Sheet 1: Daily summary
  var h1=['Date','Day','NCH Rev','NCH Orders','HE Rev','HE Orders','Total Rev','DB Sales','Gap','OpEx','CapEx','P&L','Cash Naveen','Razorpay','Paytm','Complimentary','Capital'];
  var r1=DATA.map(function(d){var opex=0,capex=0;d.expenses.forEach(function(e){if(e.cat==='CapEx')capex+=e.d;else opex+=e.d});return[d.date,d.day,d.nch.revenue,d.nch.orders,d.he.revenue,d.he.orders,d.total_revenue,d.db_sales,d.total_revenue-d.db_sales,opex,capex,d.total_revenue-opex,d.cash_naveen,d.razorpay.gross,d.paytm.gross,d.complimentary,d.capital]});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h1].concat(r1)),'Daily Summary');
  // Sheet 2: Revenue by product (all days, all products)
  var h2=['Date','Brand','Product','Qty','Unit Price','Amount','Category'];
  var r2=[];
  DATA.forEach(function(d){
    d.nch.products.forEach(function(p){r2.push([d.date,'NCH',p.name,p.qty,p.unit,p.amount,p.cat])});
    d.he.products.forEach(function(p){r2.push([d.date,'HE',p.name,p.qty,p.unit,p.amount,p.cat])});
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h2].concat(r2)),'Revenue Products');
  // Sheet 3: All expenses
  var h3=['Date','Category','Item','Amount'];
  var r3=[];
  DATA.forEach(function(d){d.expenses.forEach(function(e){r3.push([d.date,e.cat,e.p,e.d])})});
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet([h3].concat(r3)),'All Expenses');
  XLSX.writeFile(wb,'HN_Reconciliation_Master.xlsx');
}
